<script type="module">
    import { TapeLoader, TRDLoader, SCLLoader, MGTLoader, MDRLoader, OPDLoader, SZXLoader, ZipLoader, RZXLoader, WAVLoader, SnapshotLoader } from '../core/loaders.js';
    import { DSKLoader, DSKImage } from '../core/fdc.js';

    const TEST_VERSION = '0.9.12';

    let totalPassed = 0;
    let totalFailed = 0;
    const logEl = document.getElementById('log');
    const summaryEl = document.getElementById('summary');

    function updateSummary() {
        const total = totalPassed + totalFailed;
        const rate = total > 0 ? ((totalPassed / total) * 100).toFixed(1) : '0.0';
        summaryEl.innerHTML = `v${TEST_VERSION} | <span class="pass">Pass: ${totalPassed}</span> | <span class="fail">Fail: ${totalFailed}</span> | Total: ${total} | Rate: ${rate}%`;
    }

    function log(msg, cls = '') {
        const div = document.createElement('div');
        if (cls) div.className = cls;
        div.textContent = msg;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function section(name) {
        log('');
        log(`\u2550\u2550\u2550 ${name} \u2550\u2550\u2550`, 'section');
    }

    function assert(condition, msg, detail = '') {
        if (condition) {
            totalPassed++;
            log(`\u2713 ${msg}`, 'pass');
        } else {
            totalFailed++;
            log(`\u2717 ${msg}${detail ? ': ' + detail : ''}`, 'fail');
        }
        updateSummary();
    }

    // ============ Helper: build minimal TRD image ============
    function buildTestTRD(files = []) {
        // 163840 bytes = 40 tracks * 16 sectors * 256 bytes (single-sided)
        const trd = new Uint8Array(163840);
        trd.fill(0);

        let dirSlot = 0;
        let nextTrack = 1, nextSector = 0; // Data starts after directory (track 1)

        for (const f of files) {
            const offset = dirSlot * 16;
            // Name: 8 bytes, space-padded
            const name = (f.name + '        ').substring(0, 8);
            for (let i = 0; i < 8; i++) trd[offset + i] = name.charCodeAt(i);
            // Extension byte
            trd[offset + 8] = f.ext.charCodeAt(0);
            // BASIC (B): 9-10 = total length (program+vars), 11-12 = program length;
            // others: 9-10 = start address, 11-12 = length. (TR-DOS convention)
            const isBasicEntry = f.ext === 'B';
            const w9 = isBasicEntry ? f.data.length : f.start;
            const w11 = isBasicEntry ? (f.progLen != null ? f.progLen : f.data.length) : f.data.length;
            trd[offset + 9] = w9 & 0xFF;
            trd[offset + 10] = (w9 >> 8) & 0xFF;
            trd[offset + 11] = w11 & 0xFF;
            trd[offset + 12] = (w11 >> 8) & 0xFF;
            // Sectors
            const sectors = Math.ceil(f.data.length / 256);
            trd[offset + 13] = sectors;
            // Starting position
            trd[offset + 14] = nextSector;
            trd[offset + 15] = nextTrack;

            // Write file data
            const dataOffset = (nextTrack * 16 + nextSector) * 256;
            for (let i = 0; i < f.data.length; i++) {
                trd[dataOffset + i] = f.data[i];
            }

            nextSector += sectors;
            while (nextSector >= 16) { nextSector -= 16; nextTrack++; }
            dirSlot++;
        }

        // Disk info sector (track 0, sector 8, offset 0x800)
        const s9 = 0x800;
        trd[s9 + 0xE1] = nextSector;      // First free sector
        trd[s9 + 0xE2] = nextTrack;       // First free track
        trd[s9 + 0xE3] = 0x16;            // Disk type (80 track, double-sided)
        trd[s9 + 0xE4] = dirSlot;         // File count
        const freeSec = (163840 / 256) - (nextTrack * 16 + nextSector);
        trd[s9 + 0xE5] = freeSec & 0xFF;
        trd[s9 + 0xE6] = (freeSec >> 8) & 0xFF;
        trd[s9 + 0xE7] = 0x10;            // TR-DOS signature
        // Disk label at 0xF5 (8 bytes)
        const label = 'TESTDISK';
        for (let i = 0; i < 8; i++) trd[s9 + 0xF5 + i] = label.charCodeAt(i);

        return trd;
    }

    // ============ Helper: build minimal SCL ============
    function buildTestSCL(files = []) {
        // Calculate size
        let totalData = 0;
        for (const f of files) totalData += f.data.length;
        const size = 8 + 1 + files.length * 14 + totalData;
        const scl = new Uint8Array(size);
        let pos = 0;

        // "SINCLAIR" signature
        const sig = 'SINCLAIR';
        for (let i = 0; i < 8; i++) scl[pos++] = sig.charCodeAt(i);
        // File count
        scl[pos++] = files.length;

        // Directory entries (14 bytes each: 8 name + 1 ext + 2 start + 2 length + 1 sectors)
        for (const f of files) {
            const name = (f.name + '        ').substring(0, 8);
            for (let i = 0; i < 8; i++) scl[pos++] = name.charCodeAt(i);
            scl[pos++] = f.ext.charCodeAt(0);
            // BASIC (B): 9-10 = total length, 11-12 = program length; others:
            // 9-10 = start address, 11-12 = length. (TR-DOS convention)
            const isBasicEntry = f.ext === 'B';
            const w9 = isBasicEntry ? f.data.length : f.start;
            const w11 = isBasicEntry ? (f.progLen != null ? f.progLen : f.data.length) : f.data.length;
            scl[pos++] = w9 & 0xFF;
            scl[pos++] = (w9 >> 8) & 0xFF;
            scl[pos++] = w11 & 0xFF;
            scl[pos++] = (w11 >> 8) & 0xFF;
            scl[pos++] = Math.ceil(f.data.length / 256);
        }

        // File data
        for (const f of files) {
            for (let i = 0; i < f.data.length; i++) scl[pos++] = f.data[i];
        }

        return scl;
    }

    // ============ Helper: build minimal TAP ============
    function buildTestTAP(blocks) {
        // Calculate total size
        let total = 0;
        for (const b of blocks) total += 2 + b.length; // 2 bytes length + data
        const tap = new Uint8Array(total);
        let pos = 0;
        for (const b of blocks) {
            tap[pos++] = b.length & 0xFF;
            tap[pos++] = (b.length >> 8) & 0xFF;
            for (let i = 0; i < b.length; i++) tap[pos++] = b[i];
        }
        return tap;
    }

    // ============ Helper: build minimal MGT image ============
    function buildTestMGT() {
        // 819200 bytes = 80 tracks * 2 sides * 10 sectors * 512 bytes
        const mgt = new Uint8Array(819200);
        mgt.fill(0);
        return mgt;
    }

    // ============ Helper: build minimal WAV file ============
    function buildTestWAV(sampleRate, bitsPerSample, channels, samples) {
        // samples: Uint8Array for 8-bit, Int16Array for 16-bit (mono channel values)
        // For stereo, samples still contains mono values — we duplicate to left+right
        const bytesPerSample = bitsPerSample / 8;
        const frameSize = bytesPerSample * channels;
        const numSamples = samples.length;
        const dataSize = numSamples * frameSize;
        const fmtSize = 16;
        // RIFF header(12) + fmt chunk(8+16) + data chunk header(8) + data
        const totalSize = 12 + 8 + fmtSize + 8 + dataSize;
        const wav = new Uint8Array(totalSize);
        let pos = 0;

        // RIFF header
        wav[pos++] = 0x52; wav[pos++] = 0x49; wav[pos++] = 0x46; wav[pos++] = 0x46; // "RIFF"
        const fileSize = totalSize - 8;
        wav[pos++] = fileSize & 0xFF; wav[pos++] = (fileSize >> 8) & 0xFF;
        wav[pos++] = (fileSize >> 16) & 0xFF; wav[pos++] = (fileSize >> 24) & 0xFF;
        wav[pos++] = 0x57; wav[pos++] = 0x41; wav[pos++] = 0x56; wav[pos++] = 0x45; // "WAVE"

        // fmt chunk
        wav[pos++] = 0x66; wav[pos++] = 0x6D; wav[pos++] = 0x74; wav[pos++] = 0x20; // "fmt "
        wav[pos++] = fmtSize & 0xFF; wav[pos++] = (fmtSize >> 8) & 0xFF;
        wav[pos++] = 0; wav[pos++] = 0;
        // audioFormat = 1 (PCM)
        wav[pos++] = 1; wav[pos++] = 0;
        // channels
        wav[pos++] = channels & 0xFF; wav[pos++] = (channels >> 8) & 0xFF;
        // sampleRate
        wav[pos++] = sampleRate & 0xFF; wav[pos++] = (sampleRate >> 8) & 0xFF;
        wav[pos++] = (sampleRate >> 16) & 0xFF; wav[pos++] = (sampleRate >> 24) & 0xFF;
        // byteRate
        const byteRate = sampleRate * frameSize;
        wav[pos++] = byteRate & 0xFF; wav[pos++] = (byteRate >> 8) & 0xFF;
        wav[pos++] = (byteRate >> 16) & 0xFF; wav[pos++] = (byteRate >> 24) & 0xFF;
        // blockAlign
        wav[pos++] = frameSize & 0xFF; wav[pos++] = (frameSize >> 8) & 0xFF;
        // bitsPerSample
        wav[pos++] = bitsPerSample & 0xFF; wav[pos++] = (bitsPerSample >> 8) & 0xFF;

        // data chunk
        wav[pos++] = 0x64; wav[pos++] = 0x61; wav[pos++] = 0x74; wav[pos++] = 0x61; // "data"
        wav[pos++] = dataSize & 0xFF; wav[pos++] = (dataSize >> 8) & 0xFF;
        wav[pos++] = (dataSize >> 16) & 0xFF; wav[pos++] = (dataSize >> 24) & 0xFF;

        // Sample data
        for (let i = 0; i < numSamples; i++) {
            for (let ch = 0; ch < channels; ch++) {
                if (bitsPerSample === 8) {
                    wav[pos++] = samples[i]; // 8-bit unsigned
                } else {
                    // 16-bit signed little-endian
                    const s = samples[i];
                    wav[pos++] = s & 0xFF;
                    wav[pos++] = (s >> 8) & 0xFF;
                }
            }
        }

        return wav;
    }

    // ==================== FORMAT DETECTION TESTS ====================

    function runFormatDetection() {
        section('Format Detection - TRD');

        {
            const trd = buildTestTRD();
            assert(TRDLoader.isTRD(trd) === true, 'valid TRD detected');
        }
        {
            assert(TRDLoader.isTRD(new Uint8Array(100)) === false, 'small data rejected');
        }
        {
            const bad = new Uint8Array(163840);
            bad.fill(0);
            // No 0x10 signature and no valid first char
            assert(TRDLoader.isTRD(bad) === false, 'blank image without signature rejected');
        }

        section('Format Detection - SCL');

        {
            const scl = buildTestSCL([]);
            assert(SCLLoader.isSCL(scl) === true, 'valid SCL detected');
        }
        {
            assert(SCLLoader.isSCL(new Uint8Array(5)) === false, 'too small SCL rejected');
        }
        {
            const bad = new Uint8Array(20);
            bad.fill(0x41); // "AAAAAAAA..."
            assert(SCLLoader.isSCL(bad) === false, 'wrong signature rejected');
        }

        section('Format Detection - MGT');

        {
            const mgt = buildTestMGT();
            assert(MGTLoader.isMGT(mgt) === true, 'valid MGT detected (empty disk)');
        }
        {
            assert(MGTLoader.isMGT(new Uint8Array(100)) === false, 'wrong size rejected');
        }
        {
            assert(MGTLoader.isMGT(new Uint8Array(819201)) === false, '1 byte too large rejected');
        }

        section('Format Detection - MDR');

        {
            const mdr = MDRLoader.createBlankMDR('TEST');
            assert(MDRLoader.isMDR(mdr) === true, 'blank MDR detected');
        }
        {
            assert(MDRLoader.isMDR(new Uint8Array(100)) === false, 'wrong size rejected');
        }
        {
            // All-zeros at correct size is accepted: all sectors appear free (hdflag=0, recflg=0)
            assert(MDRLoader.isMDR(new Uint8Array(137923)) === true,
                'correct size with all-zero sectors accepted (all free)');
        }

        section('Format Detection - OPD');

        {
            const opd = OPDLoader.createBlankOPD(1);
            assert(OPDLoader.isOPD(opd) === true, 'single-sided OPD detected');
        }
        {
            const opd2 = OPDLoader.createBlankOPD(2);
            assert(OPDLoader.isOPD(opd2) === true, 'double-sided OPD detected');
            assert(OPDLoader.isDoubleSided(opd2) === true, 'double-sided flag correct');
        }
        {
            assert(OPDLoader.isOPD(new Uint8Array(100)) === false, 'wrong size rejected');
        }
        {
            assert(OPDLoader.isDoubleSided(OPDLoader.createBlankOPD(1)) === false,
                'single-sided not flagged as double');
        }

        section('Format Detection - DSK');

        {
            // Standard DSK signature
            const dsk = new Uint8Array(256);
            const sig = 'MV - CPC';
            for (let i = 0; i < sig.length; i++) dsk[i] = sig.charCodeAt(i);
            assert(DSKLoader.isDSK(dsk) === true, 'standard DSK signature detected');
        }
        {
            // Extended DSK signature
            const dsk = new Uint8Array(256);
            const sig = 'EXTENDED CPC DSK';
            for (let i = 0; i < sig.length; i++) dsk[i] = sig.charCodeAt(i);
            assert(DSKLoader.isDSK(dsk) === true, 'extended DSK signature detected');
        }
        {
            assert(DSKLoader.isDSK(new Uint8Array(100)) === false, 'too small rejected');
        }
        {
            const bad = new Uint8Array(256);
            bad.fill(0x41);
            assert(DSKLoader.isDSK(bad) === false, 'wrong signature rejected');
        }

        section('Format Detection - SZX');

        {
            const szx = new Uint8Array(16);
            szx[0] = 0x5A; szx[1] = 0x58; szx[2] = 0x53; szx[3] = 0x54; // "ZXST"
            assert(SZXLoader.isSZX(szx) === true, 'valid SZX detected');
        }
        {
            assert(SZXLoader.isSZX(new Uint8Array(4)) === false, 'too small rejected');
        }
        {
            const bad = new Uint8Array(16);
            bad.fill(0);
            assert(SZXLoader.isSZX(bad) === false, 'wrong signature rejected');
        }

        section('Format Detection - WAV');

        {
            const wav = buildTestWAV(44100, 8, 1, new Uint8Array([128, 255, 128, 0]));
            assert(WAVLoader.isWAV(wav) === true, 'valid WAV detected');
        }
        {
            assert(WAVLoader.isWAV(new Uint8Array(5)) === false, 'too small rejected');
        }
        {
            assert(WAVLoader.isWAV(new Uint8Array(20)) === false, 'zeroed data rejected');
        }
        {
            // Valid RIFF but wrong format (not WAVE)
            const bad = new Uint8Array(12);
            bad[0] = 0x52; bad[1] = 0x49; bad[2] = 0x46; bad[3] = 0x46; // "RIFF"
            bad[8] = 0x41; bad[9] = 0x56; bad[10] = 0x49; bad[11] = 0x20; // "AVI "
            assert(WAVLoader.isWAV(bad) === false, 'RIFF AVI rejected');
        }
        {
            // ArrayBuffer input (not Uint8Array)
            const wav = buildTestWAV(44100, 8, 1, new Uint8Array([128]));
            assert(WAVLoader.isWAV(wav.buffer) === true, 'ArrayBuffer input accepted');
        }

        section('Format Detection - ZIP');

        {
            const zip = new Uint8Array(10);
            zip[0] = 0x50; zip[1] = 0x4B; zip[2] = 0x03; zip[3] = 0x04;
            assert(ZipLoader.isZip(zip) === true, 'valid ZIP detected');
        }
        {
            assert(ZipLoader.isZip(new Uint8Array(10)) === false, 'empty data rejected');
        }

        section('Format Detection - RZX');

        {
            const rzx = new Uint8Array(16);
            rzx[0] = 0x52; rzx[1] = 0x5A; rzx[2] = 0x58; rzx[3] = 0x21; // "RZX!"
            assert(RZXLoader.isRZX(rzx) === true, 'valid RZX detected');
        }
        {
            assert(RZXLoader.isRZX(new Uint8Array(5)) === false, 'too small rejected');
        }
    }

    // ==================== TAP TESTS ====================

    function runTAPTests() {
        section('TAP - Load and parse');

        {
            // Header block: flag=0x00, 17 data bytes + flag byte = 19 total
            const headerData = new Uint8Array(19);
            headerData[0] = 0x00; // flag: header
            headerData[1] = 0x03; // type: CODE
            // Filename "test" (10 bytes padded)
            const name = 'test      ';
            for (let i = 0; i < 10; i++) headerData[2 + i] = name.charCodeAt(i);
            headerData[12] = 0x05; headerData[13] = 0x00; // data length: 5
            headerData[14] = 0x00; headerData[15] = 0x80; // param1: 0x8000
            headerData[16] = 0x00; headerData[17] = 0x80; // param2
            headerData[18] = 0x00; // checksum (placeholder)

            // Data block: flag=0xFF, 5 bytes + flag = 7 total
            const dataBlock = new Uint8Array(7);
            dataBlock[0] = 0xFF; // flag: data
            dataBlock[1] = 0x01;
            dataBlock[2] = 0x02;
            dataBlock[3] = 0x03;
            dataBlock[4] = 0x04;
            dataBlock[5] = 0x05;
            dataBlock[6] = 0x00; // checksum placeholder

            const tap = buildTestTAP([headerData, dataBlock]);
            const loader = new TapeLoader();
            const result = loader.load(tap);
            assert(result === true, 'TAP load succeeds');
            assert(loader.getBlockCount() === 2, 'TAP has 2 blocks');
        }

        section('TAP - Block navigation');

        {
            const b1 = new Uint8Array([0x00, 0x41]); // flag=0, 1 data byte
            const b2 = new Uint8Array([0xFF, 0x42]); // flag=FF, 1 data byte
            const b3 = new Uint8Array([0xFF, 0x43]);
            const tap = buildTestTAP([b1, b2, b3]);
            const loader = new TapeLoader();
            loader.load(tap);

            assert(loader.getBlockCount() === 3, '3 blocks loaded');
            assert(loader.hasMoreBlocks() === true, 'hasMoreBlocks initially true');
            assert(loader.getCurrentBlock() === 0, 'starts at block 0');

            const first = loader.getNextBlock();
            assert(first.flag === 0x00, 'first block flag=0');
            assert(loader.getCurrentBlock() === 1, 'after getNext, at block 1');

            const second = loader.getNextBlock();
            assert(second.flag === 0xFF, 'second block flag=FF');

            const third = loader.getNextBlock();
            assert(third.flag === 0xFF, 'third block flag=FF');
            assert(loader.hasMoreBlocks() === false, 'no more blocks');

            const none = loader.getNextBlock();
            assert(none === null, 'getNextBlock returns null past end');

            loader.rewind();
            assert(loader.getCurrentBlock() === 0, 'rewind goes to 0');
            assert(loader.hasMoreBlocks() === true, 'hasMoreBlocks after rewind');

            loader.setCurrentBlock(2);
            assert(loader.getCurrentBlock() === 2, 'setCurrentBlock works');
        }

        section('TAP - Block data integrity');

        {
            const blockData = new Uint8Array(258);
            blockData[0] = 0xFF;
            for (let i = 1; i < 258; i++) blockData[i] = i & 0xFF;
            const tap = buildTestTAP([blockData]);
            const loader = new TapeLoader();
            loader.load(tap);

            const block = loader.getNextBlock();
            assert(block.length === 258, 'block length correct');
            assert(block.data[0] === 0xFF, 'flag byte preserved');
            assert(block.data[1] === 0x01, 'data byte 1 correct');
            assert(block.data[257] === 0x01, 'last data byte correct');
        }

        section('TAP - Unified blocks (timing parameters)');

        {
            const hdr = new Uint8Array(19);
            hdr[0] = 0x00; // flag=0 → header
            const dat = new Uint8Array(5);
            dat[0] = 0xFF; // flag=FF → data
            const tap = buildTestTAP([hdr, dat]);
            const loader = new TapeLoader();
            loader.load(tap);

            const unified = loader.getUnifiedBlocks();
            assert(unified.length === 2, 'unified blocks count');
            // Header block: pilotCount = 8063
            assert(unified[0].pilotCount === 8063, 'header pilot count 8063');
            assert(unified[0].pilotPulse === 2168, 'pilot pulse 2168');
            // Data block: pilotCount = 3223
            assert(unified[1].pilotCount === 3223, 'data pilot count 3223');
            assert(unified[1].zeroPulse === 855, 'zero pulse 855');

    function runTRDTests() {
        section('TRD - List files');

        {
            const testData = new Uint8Array([0x01, 0x02, 0x03, 0x04, 0x05]);
            const trd = buildTestTRD([
                { name: 'game', ext: 'C', start: 0x8000, data: testData },
                { name: 'loader', ext: 'B', start: 10, data: new Uint8Array([0x0E, 0x00, 0x0A]) }
            ]);

            const files = TRDLoader.listFiles(trd);
            assert(files.length === 2, 'found 2 files');
            assert(files[0].name === 'game', 'first file name correct');
            assert(files[0].ext === 'C', 'first file ext correct');
            assert(files[0].type === 'code', 'CODE type detected');
            assert(files[0].start === 0x8000, 'start address correct');
            assert(files[0].length === 5, 'file length correct');
            assert(files[1].name === 'loader', 'second file name');
            assert(files[1].type === 'basic', 'BASIC type detected');
            assert(files[1].fullName === 'loader.B', 'fullName includes extension');
        }

        section('TRD - Extract file');

        {
            const original = new Uint8Array([0xDE, 0xAD, 0xBE, 0xEF, 0x42]);
            const trd = buildTestTRD([
                { name: 'test', ext: 'C', start: 0x6000, data: original }
            ]);
            const files = TRDLoader.listFiles(trd);
            const extracted = TRDLoader.extractFile(trd, files[0]);
            assert(extracted.length === 5, 'extracted length matches');
            assert(extracted[0] === 0xDE && extracted[1] === 0xAD &&
                   extracted[2] === 0xBE && extracted[3] === 0xEF &&
                   extracted[4] === 0x42, 'extracted data matches original');
        }

        section('TRD - Empty disk');

        {
            const trd = buildTestTRD([]);
            assert(TRDLoader.isTRD(trd) === true, 'empty TRD is valid');
            const files = TRDLoader.listFiles(trd);
            assert(files.length === 0, 'empty TRD has 0 files');
        }

        section('TRD - fileToTAP');

        {
            const codeData = new Uint8Array([0x01, 0x02, 0x03]);
            const trd = buildTestTRD([
                { name: 'test', ext: 'C', start: 0x8000, data: codeData }
            ]);
            const files = TRDLoader.listFiles(trd);
            const tapBlocks = TRDLoader.fileToTAP(codeData, files[0]);
            assert(tapBlocks !== null && tapBlocks !== undefined, 'fileToTAP returns result');
            assert(tapBlocks.length >= 1, 'fileToTAP produces at least 1 block');
        }

        section('TRD - BASIC with variables area');

        {
            // A BASIC file = program (10 bytes) + variables area (6 bytes) = 16 total.
            // Per TR-DOS: dir 9-10 = total length (16), 11-12 = program length (10).
            const prog = new Uint8Array(16);
            for (let i = 0; i < 16; i++) prog[i] = i + 1;   // 0x01..0x10
            const trd = buildTestTRD([
                { name: 'withvars', ext: 'B', start: 0, data: prog, progLen: 10 }
            ]);
            const files = TRDLoader.listFiles(trd);
            assert(files.length === 1, 'BASIC TRD has 1 file');
            const f = files[0];
            assert(f.type === 'basic', 'BASIC type detected');
            assert(f.length === 16, 'length is the TOTAL program+variables', `got ${f.length}`);
            assert(f.programLength === 10, 'programLength is the variables offset', `got ${f.programLength}`);
            assert(f.start === 0, 'BASIC start address is 0 (no load address)');
            // Extraction must keep the whole program + variables (the bug truncated it)
            const data = TRDLoader.extractFile(trd, f);
            assert(data.length === 16, 'extractFile returns full program+variables', `got ${data ? data.length : 'null'}`);
            assert(Array.from(data).every((b, i) => b === i + 1), 'extracted bytes match (variables preserved)');
            // TAP header: data length = total, program-length param2 = variables offset.
            // fileToTAP returns a flat TAP (2-byte length prefix + 19-byte header block),
            // so header byte i lives at tap[2 + i].
            const tap = TRDLoader.fileToTAP(data, f);
            const H = (i) => tap[2 + i] | (tap[2 + i + 1] << 8);
            assert(H(12) === 16, 'TAP header data length = total (16)', `got ${H(12)}`);
            assert(H(16) === 10, 'TAP header param2 = program length (10)', `got ${H(16)}`);
            assert(H(14) >= 0x8000, 'TAP header autostart = none', `got ${H(14)}`);
        }
    }

    function runMGTTests() {
        section('MGT - Blank disk');

        {
            const mgt = buildTestMGT();
            assert(MGTLoader.isMGT(mgt) === true, 'blank MGT valid');
            const files = MGTLoader.listFiles(mgt);
            assert(files.length === 0, 'blank MGT has 0 files');
        }

        section('MGT - Disk info');

        {
            const mgt = buildTestMGT();
            const info = MGTLoader.getDiskInfo(mgt);
            assert(info.totalSectors > 0, 'totalSectors > 0');
            assert(info.tracks === 80, 'tracks = 80');
            assert(info.sides === 2, 'sides = 2');
            assert(info.sectorsPerTrack === 10, 'sectors/track = 10');
            assert(info.bytesPerSector === 512, 'bytes/sector = 512');
            assert(info.totalSize === 819200, 'totalSize = 819200');
            assert(info.fileCount === 0, 'fileCount = 0 on blank');
        }

        section('MGT - Sector offset calculation');

        {
            // Track 0, side 0, sector 1 → offset 0
            assert(MGTLoader.getSectorOffset(0, 0, 1) === 0, 'T0/S0/Sec1 = offset 0');
            // Track 0, side 0, sector 2 → offset 512
            assert(MGTLoader.getSectorOffset(0, 0, 2) === 512, 'T0/S0/Sec2 = offset 512');
            // Track 0, side 1, sector 1 → 10 sectors in
            assert(MGTLoader.getSectorOffset(0, 1, 1) === 10 * 512, 'T0/S1/Sec1');
            // Track 1, side 0, sector 1 → 20 sectors in
            assert(MGTLoader.getSectorOffset(1, 0, 1) === 20 * 512, 'T1/S0/Sec1');
        }

        section('MGT - Wrong size rejected');

        {
            assert(MGTLoader.isMGT(new Uint8Array(819199)) === false, '1 byte too small');
            assert(MGTLoader.isMGT(new Uint8Array(500000)) === false, 'random size rejected');
        }

        section('MGT - buildMGT round-trip (chain format)');

        {
            const cmp = (a, b) => {
                if (!a || a.length !== b.length) return false;
                for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
                return true;
            };
            // multi-sector files exercise the 510-data + 2-byte chain pointer layout
            const d1 = new Uint8Array(1200); for (let i = 0; i < 1200; i++) d1[i] = (i * 3 + 10) & 0xFF; // 3 sectors
            const d2 = new Uint8Array(400);  for (let i = 0; i < 400; i++)  d2[i] = (i * 7 + 20) & 0xFF; // 1 sector
            const d3 = new Uint8Array(1020); for (let i = 0; i < 1020; i++) d3[i] = (i * 5 + 30) & 0xFF; // 3 sectors once the 9-byte +D header is prepended (1020+9=1029)

            const img = MGTLoader.buildMGT([
                { name: 'CODE1', mgtType: 4, tapeType: 3, length: 1200, data: d1, startAddress: 0x8000 },
                { name: 'CODE2', mgtType: 4, tapeType: 3, length: 400,  data: d2, startAddress: 0x9000 },
                { name: 'CODE3', mgtType: 4, tapeType: 3, length: 1020, data: d3, startAddress: 0xA000 },
            ]);
            assert(img.length === 819200, 'built image is DS size');
            assert(MGTLoader.isMGT(img) === true, 'built image detected as MGT');

            const files = MGTLoader.listFiles(img);
            assert(files.length === 3, `3 files listed (got ${files.length})`);

            const f1 = files.find(f => f.name === 'CODE1');
            assert(!!f1 && f1.sectors === 3, `CODE1 uses 3 chain sectors (got ${f1 ? f1.sectors : '?'})`);
            assert(cmp(MGTLoader.extractFile(img, f1), d1), 'CODE1 (3 sectors) round-trips byte-identical');

            const f2 = files.find(f => f.name === 'CODE2');
            assert(!!f2 && cmp(MGTLoader.extractFile(img, f2), d2), 'CODE2 (1 sector) round-trips');

            const f3 = files.find(f => f.name === 'CODE3');
            assert(!!f3 && f3.sectors === 3, `CODE3 uses 3 chain sectors incl. 9-byte header (got ${f3 ? f3.sectors : '?'})`);
            assert(cmp(MGTLoader.extractFile(img, f3), d3), 'CODE3 (3 sectors) round-trips');

            assert(f1.startAddress === 0x8000 && f3.startAddress === 0xA000, 'start addresses preserved');

            // BASIC file: autostart + body length carried in metadata
            const bas = new Uint8Array(300); for (let i = 0; i < 300; i++) bas[i] = (i + 1) & 0xFF;
            const bimg = MGTLoader.buildMGT([
                { name: 'PROG', mgtType: 1, tapeType: 0, length: 300, data: bas, startAddress: 23755, bodyLength: 200, autostart: 10 },
            ]);
            const bf = MGTLoader.listFiles(bimg)[0];
            assert(bf && bf.type === 1 && bf.autostart === 10, 'BASIC autostart preserved');
            assert(cmp(MGTLoader.extractFile(bimg, bf), bas), 'BASIC data round-trips');
        }
    }

            const mdr = MDRLoader.buildMDR([

            ], 'CART', 600);

            const files = MDRLoader.listFiles(mdr);

        section('MDR - Oversized: multiple files across cartridge boundary');

        {

            for (let f = 0; f < 5; f++) {
                const data = new Uint8Array(100 * 512);  // 100 sectors each
                for (let i = 0; i < data.length; i++) data[i] = (f * 37 + i) & 0xFF;
                files.push({ name: `file${f}`, data, isPrint: false });
            }

            const mdr = MDRLoader.buildMDR(files, 'MULTI5', 600);
            const listed = MDRLoader.listFiles(mdr);
            assert(listed.length === 5, 'found all 5 files',
                `got: ${listed.length}`);

            // Verify file crossing the 254-sector boundary
            let sectorsSoFar = 0;
            for (let f = 0; f < 5; f++) {
                assert(listed[f].name.trim() === `file${f}`, `file ${f} name correct`);
                assert(listed[f].sectors === 100, `file ${f} has 100 sectors`,

                sectorsSoFar += 100;

            // Verify extraction of a file that starts after sector 254

            const extracted = MDRLoader.extractFile(mdr, file3);
            const origFile3 = files[3].data;
            assert(extracted.length === origFile3.length, 'file3 extracted length correct');
            let match = true;

            assert(info.fileCount === 1, 'file count = 1');
        }

        section('MDR - Oversized: capacity limit');

        {
            // Try to add a file that exceeds the oversized image capacity
            const tooLarge = new Uint8Array(510 * 512);
            const mdr = MDRLoader.buildMDR([
                { name: 'huge', data: tooLarge, isPrint: false }
            ], 'FULL', 508);

            // Should not fit — buildMDR breaks when nextSector + numSectors > sectorCount
            const files = MDRLoader.listFiles(mdr);
            assert(files.length === 0, 'file too large for 508 sectors is rejected',
                `got: ${files.length} files`);
        }

        section('MDR - Oversized: rebuild preserves sector count');

        {
            // Simulate editor round-trip: build → list → rebuild
            const fileData = new Uint8Array(50 * 512);
            for (let i = 0; i < fileData.length; i++) fileData[i] = i & 0xFF;

            const mdr1 = MDRLoader.buildMDR([
                { name: 'round', data: fileData, isPrint: false }
            ], 'TRIP', 890);

            assert(mdr1.length === 890 * 543 + 1, 'initial oversized image size');

            // Simulate editor: list files from image, then rebuild
            const files = MDRLoader.listFiles(mdr1);
            const rebuiltFiles = files.map(f => ({
                name: f.name.trim(),
                data: MDRLoader.extractFile(mdr1, f),
                isPrint: f.isPrint
            }));

            const sectorCount = MDRLoader.getSectorCount(mdr1);
            const mdr2 = MDRLoader.buildMDR(rebuiltFiles, 'TRIP', sectorCount);

            assert(mdr2.length === mdr1.length, 'rebuilt image same size as original',
                `got: ${mdr2.length}, expected: ${mdr1.length}`);
            assert(MDRLoader.getSectorCount(mdr2) === 890, 'rebuilt has 890 sectors');

            const files2 = MDRLoader.listFiles(mdr2);
            assert(files2.length === 1, 'rebuilt has 1 file');
            assert(files2[0].name.trim() === 'round', 'rebuilt file name preserved');
        }
    }

            assert(OPDLoader.getSectorOffset(0, 0, 0, 1) === 0, 'T0/S0/Sec0 SS = 0');
            // Track 0, side 0, sector 1 → offset 256
            assert(OPDLoader.getSectorOffset(0, 0, 1, 1) === 256, 'T0/S0/Sec1 SS = 256');
            // Track 1, side 0, sector 0 → 18 sectors in
            assert(OPDLoader.getSectorOffset(1, 0, 0, 1) === 18 * 256, 'T1/S0/Sec0 SS');
            // Double-sided: track 0, side 1, sector 0
            assert(OPDLoader.getSectorOffset(0, 1, 0, 2) === 18 * 256, 'T0/S1/Sec0 DS');
        }

        section('OPD - List files on blank');

        {
            const opd = OPDLoader.createBlankOPD(1);
            const files = OPDLoader.listFiles(opd);
            assert(files.length === 0, 'blank OPD has 0 files');
        }

        section('OPD - Constants');

        {
            assert(OPDLoader.SECTORS_PER_TRACK === 18, 'SECTORS_PER_TRACK = 18');
            assert(OPDLoader.BYTES_PER_SECTOR === 256, 'BYTES_PER_SECTOR = 256');
            assert(OPDLoader.SS_SIZE === 184320, 'SS_SIZE correct');
            assert(OPDLoader.DS_SIZE === 737280, 'DS_SIZE correct (80-track DS)');
        }

        section('OPD - buildOPD round-trip');

        {
            const cmp = (a, b) => {
                if (!a || a.length !== b.length) return false;
                for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
                return true;
            };
            const d1 = new Uint8Array(700); for (let i = 0; i < 700; i++) d1[i] = (i * 3 + 5) & 0xFF; // 3 sectors (700+7 header)
            const d2 = new Uint8Array(200); for (let i = 0; i < 200; i++) d2[i] = (i * 7 + 9) & 0xFF; // 1 sector
            const img = OPDLoader.buildOPD([
                { name: 'CODE1', type: 3, data: d1, startAddr: 0x8000 },
                { name: 'PROG1', type: 0, data: d2, autostart: 10, progLength: 200 },
            ], 'TESTDISK', 1, OPDLoader.createBlankOPD(1));

            assert(OPDLoader.isOPD(img) === true, 'built OPD is valid');
            const files = OPDLoader.listFiles(img);
            assert(files.length === 2, `2 files listed (got ${files.length})`);

            const f1 = files.find(f => f.name === 'CODE1');
            assert(!!f1 && f1.type === 3 && f1.startAddr === 0x8000, 'CODE1 header (type 3, addr 0x8000)');
            assert(cmp(OPDLoader.extractFile(img, f1), d1), 'CODE1 (3 sectors) round-trips byte-identical');

            const f2 = files.find(f => f.name === 'PROG1');
            assert(!!f2 && f2.type === 0 && f2.autostart === 10, 'PROG1 BASIC header (autostart 10)');
            assert(cmp(OPDLoader.extractFile(img, f2), d2), 'PROG1 (1 sector) round-trips');

            assert(OPDLoader.getDiskInfo(img).diskLabel === 'TESTDISK', 'disk label preserved');
        }
    }

    // ==================== DSK TESTS ====================

    function runDSKTests() {
        section('DSK - Constants');

        {
            assert(DSKLoader.STANDARD_SIGNATURE === 'MV - CPC', 'standard signature string');
            assert(DSKLoader.EXTENDED_SIGNATURE === 'EXTENDED CPC DSK',
                'extended signature string');
        }

        section('DSK - Parse minimal standard DSK');

        {
            // Build a minimal standard DSK: 1 track, 1 side, 1 sector
            const trackSize = 256 + 512; // track info block + 1 sector of 512 bytes
            const totalSize = 256 + trackSize; // disk header + 1 track
            const dsk = new Uint8Array(totalSize);

            // Disk header (256 bytes)
            const sig = 'MV - CPCEMU Disk-File\r\nDisk-Info\r\n';
            for (let i = 0; i < sig.length; i++) dsk[i] = sig.charCodeAt(i);
            dsk[0x30] = 1; // number of tracks
            dsk[0x31] = 1; // number of sides
            dsk[0x32] = trackSize & 0xFF;
            dsk[0x33] = (trackSize >> 8) & 0xFF;

            // Track info block at offset 256
            const tOff = 256;
            const tsig = 'Track-Info\r\n';
            for (let i = 0; i < tsig.length; i++) dsk[tOff + i] = tsig.charCodeAt(i);
            dsk[tOff + 0x10] = 0; // track number
            dsk[tOff + 0x11] = 0; // side number
            dsk[tOff + 0x14] = 2; // sector size code (2 = 512 bytes)
            dsk[tOff + 0x15] = 1; // number of sectors
            dsk[tOff + 0x16] = 0x4E; // gap3 length
            dsk[tOff + 0x17] = 0xE5; // filler byte

            // Sector info at tOff + 0x18
            dsk[tOff + 0x18] = 0; // track (C)
            dsk[tOff + 0x19] = 0; // side (H)
            dsk[tOff + 0x1A] = 0xC1; // sector ID (R) - standard +3 starting ID
            dsk[tOff + 0x1B] = 2; // size code (N)

            // Sector data at tOff + 256
            dsk[tOff + 256] = 0x42; // test data byte

            let parsed = null;
            let parseError = null;
            try {
                parsed = DSKLoader.parse(dsk);
            } catch (e) {
                parseError = e.message;
            }
            assert(parsed !== null, 'standard DSK parsed successfully',
                parseError || '');
            if (parsed) {
                assert(parsed.numTracks === 1, 'numTracks = 1');
                assert(parsed.numSides === 1, 'numSides = 1');
                assert(parsed.isExtended === false, 'not extended format');
                const sec = parsed.readSector(0, 0, 0xC1);
                assert(sec !== null, 'sector 0xC1 readable');
                if (sec) {
                    assert(sec[0] === 0x42, 'sector data correct');
                }
            }
        }

        section('DSK - DSKImage methods');

        {
            // Build simple image and test methods
            const trackSize = 256 + 512;
            const totalSize = 256 + trackSize;
            const dsk = new Uint8Array(totalSize);
            const sig = 'MV - CPCEMU Disk-File\r\nDisk-Info\r\n';
            for (let i = 0; i < sig.length; i++) dsk[i] = sig.charCodeAt(i);
            dsk[0x30] = 1; dsk[0x31] = 1;
            dsk[0x32] = trackSize & 0xFF; dsk[0x33] = (trackSize >> 8) & 0xFF;
            const tOff = 256;
            const tsig = 'Track-Info\r\n';
            for (let i = 0; i < tsig.length; i++) dsk[tOff + i] = tsig.charCodeAt(i);
            dsk[tOff + 0x14] = 2; dsk[tOff + 0x15] = 1;
            dsk[tOff + 0x16] = 0x4E; dsk[tOff + 0x17] = 0xE5;
            dsk[tOff + 0x18] = 0; dsk[tOff + 0x19] = 0;
            dsk[tOff + 0x1A] = 0xC1; dsk[tOff + 0x1B] = 2;

            const image = DSKLoader.parse(dsk);
            assert(image.getTotalTracks() === 1, 'getTotalTracks() = 1');

            const track = image.getTrack(0, 0);
            assert(track !== null, 'getTrack(0,0) returns track');
            if (track) {
                assert(track.sectors.length === 1, 'track has 1 sector');
            }

            assert(image.getTrack(5, 0) === null, 'getTrack(5,0) returns null');
            assert(image.readSector(5, 0, 0xC1) === null, 'readSector on missing track returns null');
        }

        section('DSK - writeSector');

        {
            const trackSize = 256 + 512;
            const totalSize = 256 + trackSize;
            const dsk = new Uint8Array(totalSize);
            const sig = 'MV - CPCEMU Disk-File\r\nDisk-Info\r\n';
            for (let i = 0; i < sig.length; i++) dsk[i] = sig.charCodeAt(i);
            dsk[0x30] = 1; dsk[0x31] = 1;
            dsk[0x32] = trackSize & 0xFF; dsk[0x33] = (trackSize >> 8) & 0xFF;
            const tOff = 256;
            const tsig = 'Track-Info\r\n';
            for (let i = 0; i < tsig.length; i++) dsk[tOff + i] = tsig.charCodeAt(i);
            dsk[tOff + 0x14] = 2; dsk[tOff + 0x15] = 1;
            dsk[tOff + 0x16] = 0x4E; dsk[tOff + 0x17] = 0xE5;
            dsk[tOff + 0x18] = 0; dsk[tOff + 0x19] = 0;
            dsk[tOff + 0x1A] = 0xC1; dsk[tOff + 0x1B] = 2;

            const image = DSKLoader.parse(dsk);
            const newData = new Uint8Array(512);
            newData[0] = 0xBE; newData[1] = 0xEF;
            const ok = image.writeSector(0, 0, 0xC1, newData);
            assert(ok === true, 'writeSector returns true');

            const readBack = image.readSector(0, 0, 0xC1);
            assert(readBack[0] === 0xBE && readBack[1] === 0xEF,
                'written data reads back correctly');
        }
    }

    // ==================== SZX TESTS ====================

    function runSZXTests() {
        section('SZX - Machine type mapping');

        {
            // szxMachineId values from MACHINE_PROFILES: 48k=1, 128k=2, +2=3, +2a=4, +3=5, pentagon=7, scorpion=8
            // getMachineType uses getMachineBySzxId() which matches profile szxMachineId, NOT linear index
            assert(SZXLoader.getMachineType(0) === '48k', 'machine 0 = 48k (fallback)');
            assert(SZXLoader.getMachineType(1) === '48k', 'machine 1 = 48k (szxMachineId:1)');
            assert(SZXLoader.getMachineType(2) === '128k', 'machine 2 = 128k (szxMachineId:2)');
            assert(SZXLoader.getMachineType(3) === '+2', 'machine 3 = +2 (szxMachineId:3)');
            assert(SZXLoader.getMachineType(4) === '+2a', 'machine 4 = +2a (szxMachineId:4)');
            assert(SZXLoader.getMachineType(5) === '+3', 'machine 5 = +3 (szxMachineId:5)');
            assert(SZXLoader.getMachineType(7) === 'pentagon', 'machine 7 = pentagon (szxMachineId:7)');
            assert(SZXLoader.getMachineType(8) === 'scorpion', 'machine 8 = scorpion (szxMachineId:8)');
        }

        section('SZX - Parse minimal header');

        {
            // Build minimal SZX: header only (8 bytes)
            const szx = new Uint8Array(8);
            szx[0] = 0x5A; szx[1] = 0x58; // "ZX"
            szx[2] = 0x53; szx[3] = 0x54; // "ST"
            szx[4] = 1; // major version
            szx[5] = 4; // minor version
            szx[6] = 0; // machine ID = 48k
            szx[7] = 0; // flags

            const parsed = SZXLoader.parse(szx);
            assert(parsed.majorVersion === 1, 'major version = 1');
            assert(parsed.minorVersion === 4, 'minor version = 4');
            assert(parsed.machineId === 0, 'machine ID = 0');
            assert(parsed.machineType === '48k', 'machine type = 48k');
        }

        section('SZX - makeChunk');

        {
            const chunkData = new Uint8Array([0x01, 0x02, 0x03]);
            const chunk = SZXLoader.makeChunk('Z80R', chunkData);
            // Chunk format: 4-byte ID + 4-byte size + data
            assert(chunk.length === 4 + 4 + 3, 'chunk size = 11');
            assert(chunk[0] === 0x5A && chunk[1] === 0x38 && chunk[2] === 0x30 && chunk[3] === 0x52,
                'chunk ID = Z80R');
            assert(chunk[4] === 3 && chunk[5] === 0 && chunk[6] === 0 && chunk[7] === 0,
                'chunk data size = 3');
            assert(chunk[8] === 0x01 && chunk[9] === 0x02 && chunk[10] === 0x03,
                'chunk data preserved');
        }
    }

    // ==================== WAV TESTS ====================

    function runWAVTests() {
        section('WAV - 8-bit mono basic parse');

        {
            // 8-bit unsigned: 128=silence, 255=max positive, 0=max negative
            // Simple square wave: 4 high, 4 low → one full cycle
            const samples = new Uint8Array([255, 255, 255, 255, 0, 0, 0, 0, 255, 255, 255, 255, 0, 0, 0, 0]);
            const wav = buildTestWAV(44100, 8, 1, samples);
            const loader = new WAVLoader();
            const result = loader.load(wav);
            assert(result === true, '8-bit mono WAV loads successfully');
            assert(loader.metadata.sampleRate === 44100, 'sampleRate = 44100');
            assert(loader.metadata.bitsPerSample === 8, 'bitsPerSample = 8');
            assert(loader.metadata.channels === 1, 'channels = 1');
            assert(loader.metadata.totalSamples === 16, 'totalSamples = 16');
        }

        section('WAV - 16-bit mono parse');

        {
            // 16-bit signed: 0=silence, 32767=max positive, -32768=max negative
            // Build a square wave as Int16Array then convert for buildTestWAV
            const rawSamples = new Int16Array([32767, 32767, 32767, 32767, -32768, -32768, -32768, -32768]);
            const wav = buildTestWAV(48000, 16, 1, rawSamples);
            const loader = new WAVLoader();
            const result = loader.load(wav);
            assert(result === true, '16-bit mono WAV loads successfully');
            assert(loader.metadata.sampleRate === 48000, 'sampleRate = 48000');
            assert(loader.metadata.bitsPerSample === 16, 'bitsPerSample = 16');
            assert(loader.metadata.channels === 1, 'channels = 1');
            assert(loader.metadata.totalSamples === 8, 'totalSamples = 8');
        }

        section('WAV - Stereo parse (left channel only)');

        {
            // Stereo: left channel has signal, right is silent
            const samples = new Uint8Array([255, 0, 0, 255, 255, 0, 0, 255]);
            const wav = buildTestWAV(22050, 8, 2, samples);
            const loader = new WAVLoader();
            const result = loader.load(wav);
            assert(result === true, '8-bit stereo WAV loads successfully');
            assert(loader.metadata.channels === 2, 'channels = 2');
            assert(loader.metadata.totalSamples === 8, 'totalSamples = 8');
        }

        section('WAV - Block output structure');

        {
            // Square wave → should produce a 'pulses' block
            const samples = new Uint8Array([255, 255, 0, 0, 255, 255, 0, 0]);
            const wav = buildTestWAV(44100, 8, 1, samples);
            const loader = new WAVLoader();
            loader.load(wav);

            assert(loader.blocks.length >= 1, 'at least 1 block');
            const lastBlock = loader.blocks[loader.blocks.length - 1];
            assert(lastBlock.type === 'pulses', 'last block type = pulses');
            assert(Array.isArray(lastBlock.pulses), 'pulses is an array');
            assert(lastBlock.pulses.length > 0, 'pulses array not empty');
        }

        section('WAV - Pulse durations are T-state values');

        {
            // At 44100Hz, tStatesPerSample = 3500000/44100 ≈ 79.37
            // A crossing at sample 4 → ~4 * 79.37 ≈ 317 T-states from start
            const samples = new Uint8Array([255, 255, 255, 255, 0, 0, 0, 0]);
            const wav = buildTestWAV(44100, 8, 1, samples);
            const loader = new WAVLoader();
            loader.load(wav);

            const lastBlock = loader.blocks[loader.blocks.length - 1];
            // All pulse durations should be positive integers
            let allPositive = true;
            for (const p of lastBlock.pulses) {
                if (p <= 0 || !Number.isInteger(p)) { allPositive = false; break; }
            }
            assert(allPositive, 'all pulses are positive integers');

            // First pulse should be roughly 4 * 79.37 ≈ 317 T-states
            // (AC coupling may shift slightly, so allow ±50 margin)
            const tStatesPerSample = 3500000 / 44100;
            assert(lastBlock.pulses[0] > 2 * tStatesPerSample &&
                   lastBlock.pulses[0] < 6 * tStatesPerSample,
                'first pulse duration in expected range',
                `got: ${lastBlock.pulses[0]}, expected ~${Math.round(4 * tStatesPerSample)}`);
        }

        section('WAV - Initial level sets tone block');

        {
            // Signal starts high (255) → needs a tone block to set earBit=true
            const samplesHigh = new Uint8Array([255, 255, 0, 0, 255, 255]);
            const wavHigh = buildTestWAV(44100, 8, 1, samplesHigh);
            const loaderHigh = new WAVLoader();
            loaderHigh.load(wavHigh);

            // Should have a tone block prepended
            assert(loaderHigh.blocks.length === 2, 'high start: 2 blocks (tone + pulses)');
            assert(loaderHigh.blocks[0].type === 'tone', 'high start: first block = tone');
            assert(loaderHigh.blocks[0].pulseLength === 1, 'tone pulseLength = 1');
            assert(loaderHigh.blocks[0].pulseCount === 1, 'tone pulseCount = 1');
            assert(loaderHigh.blocks[1].type === 'pulses', 'high start: second block = pulses');

            // Signal starts low (0) → no tone block needed
            const samplesLow = new Uint8Array([0, 0, 255, 255, 0, 0]);
            const wavLow = buildTestWAV(44100, 8, 1, samplesLow);
            const loaderLow = new WAVLoader();
            loaderLow.load(wavLow);

            assert(loaderLow.blocks.length === 1, 'low start: 1 block (pulses only)');
            assert(loaderLow.blocks[0].type === 'pulses', 'low start: only block = pulses');
        }

        section('WAV - getBlockCount');

        {
            const samples = new Uint8Array([255, 0, 255, 0]);
            const wav = buildTestWAV(44100, 8, 1, samples);
            const loader = new WAVLoader();
            loader.load(wav);
            assert(loader.getBlockCount() === loader.blocks.length,
                'getBlockCount matches blocks.length');

            const empty = new WAVLoader();
            assert(empty.getBlockCount() === 0, 'getBlockCount = 0 before load');
        }

        section('WAV - Non-PCM format rejected');

        {
            // Build WAV with audioFormat = 3 (IEEE float)
            const wav = buildTestWAV(44100, 8, 1, new Uint8Array([128, 128]));
            // Patch audioFormat field: fmt chunk starts at offset 12+8=20, audioFormat at 20
            wav[20] = 3; wav[21] = 0;
            const loader = new WAVLoader();
            let threw = false;
            try { loader.load(wav); } catch (e) { threw = true; }
            assert(threw, 'non-PCM format throws error');
        }

        section('WAV - Invalid data rejected');

        {
            const loader = new WAVLoader();
            assert(loader.load(new Uint8Array([1, 2, 3])) === false, 'random bytes rejected');
            assert(loader.load(new Uint8Array(0)) === false, 'empty data rejected');
        }

        section('WAV - Missing chunks rejected');

        {
            // RIFF+WAVE header only, no fmt or data chunks
            const minimal = new Uint8Array(12);
            minimal[0] = 0x52; minimal[1] = 0x49; minimal[2] = 0x46; minimal[3] = 0x46;
            minimal[4] = 4; // file size (4 bytes for WAVE)
            minimal[8] = 0x57; minimal[9] = 0x41; minimal[10] = 0x56; minimal[11] = 0x45;
            const loader = new WAVLoader();
            let threw = false;
            try { loader.load(minimal); } catch (e) { threw = true; }
            assert(threw, 'WAV without fmt/data chunks throws');
        }

        section('WAV - AC coupling handles DC offset');

        {
            // Signal with heavy DC bias (all samples shifted up)
            // 8-bit: silence=128. This signal sits at 200±55 instead of 128±128
            // Without AC coupling, midpoint=(145,255)/2=200, transitions would be wrong
            // With AC coupling, local DC is tracked and crossings are found correctly
            const biased = new Uint8Array(40);
            for (let i = 0; i < 40; i++) {
                biased[i] = i % 8 < 4 ? 255 : 145; // square wave with DC bias
            }
            const wav = buildTestWAV(44100, 8, 1, biased);
            const loader = new WAVLoader();
            const result = loader.load(wav);
            assert(result === true, 'DC-biased WAV loads successfully');

            const lastBlock = loader.blocks[loader.blocks.length - 1];
            assert(lastBlock.type === 'pulses', 'DC-biased: produces pulses block');
            // Should detect crossings within the biased signal
            assert(lastBlock.pulses.length >= 4, 'DC-biased: finds crossings despite offset',
                `got ${lastBlock.pulses.length} pulses`);
        }

        section('WAV - Zero-crossing count for known waveform');

        {
            // Clean square wave: 10 cycles of 4-high + 4-low at 44100Hz
            // Each cycle has exactly 2 crossings (high→low and low→high)
            // 10 cycles → ~20 crossings → ~21 pulses (including initial and final)
            const numCycles = 10;
            const samplesPerHalf = 4;
            const totalLen = numCycles * samplesPerHalf * 2;
            const sq = new Uint8Array(totalLen);
            for (let i = 0; i < totalLen; i++) {
                sq[i] = (Math.floor(i / samplesPerHalf) % 2 === 0) ? 255 : 0;
            }
            const wav = buildTestWAV(44100, 8, 1, sq);
            const loader = new WAVLoader();
            loader.load(wav);

            const lastBlock = loader.blocks[loader.blocks.length - 1];
            // With AC coupling stabilized, should get close to 20 crossings = 21 pulses
            // Allow some margin for AC coupling adaptation at start
            assert(lastBlock.pulses.length >= 15, 'square wave: enough crossings detected',
                `got ${lastBlock.pulses.length} pulses, expected ~21`);
            assert(lastBlock.pulses.length <= 25, 'square wave: not too many crossings',
                `got ${lastBlock.pulses.length} pulses`);
        }

        section('WAV - Different sample rates');

        {
            // 22050Hz → tStatesPerSample ≈ 158.73
            const samples = new Uint8Array([255, 255, 0, 0, 255, 255, 0, 0]);
            const wav = buildTestWAV(22050, 8, 1, samples);
            const loader = new WAVLoader();
            loader.load(wav);
            assert(loader.metadata.sampleRate === 22050, 'sampleRate = 22050');

            const lastBlock = loader.blocks[loader.blocks.length - 1];
            // At 22050Hz, pulses should be roughly double the 44100Hz values
            const tStatesPerSample = 3500000 / 22050;
            assert(lastBlock.pulses[0] > tStatesPerSample, '22050Hz: pulse > 1 sample duration');
        }

        section('WAV - Metadata duration calculation');

        {
            // 100 samples at 10000 Hz = 0.01 seconds
            const samples = new Uint8Array(100);
            for (let i = 0; i < 100; i++) samples[i] = i % 2 === 0 ? 255 : 0;
            const wav = buildTestWAV(10000, 8, 1, samples);
            const loader = new WAVLoader();
            loader.load(wav);
            assert(Math.abs(loader.metadata.duration - 0.01) < 0.001,
                'duration correct for 100 samples at 10000Hz',
                `got: ${loader.metadata.duration}`);
        }
    }

    function runZ80Tests() {
        const ld = new SnapshotLoader();

        section('Z80 - RLE decompression (ED ED run, v1 vs v2/3 end marker)');
        {
            // ED ED 04 AA → four 0xAA, then literals copied through
            const r = ld.decompressZ80Block(new Uint8Array([0xED, 0xED, 0x04, 0xAA, 0x01, 0x02]), 100, true, false);
            assert(r.length === 6 && r[0] === 0xAA && r[3] === 0xAA && r[4] === 0x01 && r[5] === 0x02,
                'ED ED 04 AA expands to 4×AA then literals', `got len ${r.length}`);

            // v1: the 00 ED ED 00 end marker terminates the block
            const seq = new Uint8Array([0x42, 0x00, 0xED, 0xED, 0x00, 0x99]);
            const v1 = ld.decompressZ80Block(seq, 100, true, true);
            assert(v1.length === 1 && v1[0] === 0x42, 'v1: 00 ED ED 00 ends the block', `got len ${v1.length}`);

            // v2/3: same bytes are NOT an end marker (those blocks are length-prefixed)
            const v23 = ld.decompressZ80Block(seq, 100, true, false);
            assert(v23.length > v1.length, 'v2/3: 00 ED ED 00 is NOT an end marker', `v1=${v1.length} v23=${v23.length}`);
        }

        section('Z80 - byte 12 == 255 treated as 1 (compatibility rule)');
        {
            // v1 (PC != 0) 48K snapshot; byte12 = 255 must be read as 1
            // → border 0 and NOT compressed (so RAM is copied verbatim, not RLE-misread).
            const img = new Uint8Array(30 + 49152);
            img[6] = 0x00; img[7] = 0x80;     // PC = 0x8000 → version 1
            img[12] = 255;                    // compatibility: treat as 1
            img[30] = 0x5A;                   // first RAM byte (addr 0x4000)
            img[30 + 49151] = 0xC3;           // last RAM byte (addr 0xFFFF)
            const cpu = {};
            const mem = { buf: new Uint8Array(0x10000), write(a, v) { this.buf[a] = v; } };
            const res = ld.loadZ80(img, cpu, mem);
            assert(res.border === 0, 'byte12=255 → border 0 (not 7)', `got ${res.border}`);
            assert(mem.buf[0x4000] === 0x5A, 'RAM loaded verbatim (uncompressed, not RLE-misread)',
                `got ${mem.buf[0x4000].toString(16)}`);
            assert(mem.buf[0xFFFF] === 0xC3, 'last RAM byte loaded verbatim');
        }
    }

        runWAVTests();
        runZ80Tests();

        log('');
        log(`Completed: ${new Date().toLocaleTimeString()}`, 'info');
        log(`Total: ${totalPassed + totalFailed} | Pass: ${totalPassed} | Fail: ${totalFailed}`, totalFailed > 0 ? 'fail' : 'pass');
    }

    // Expose to buttons
    window.runAll = runAll;
    window.runFormatDetection = () => { logEl.innerHTML = ''; totalPassed = 0; totalFailed = 0; updateSummary(); runFormatDetection(); };

    runAll();
