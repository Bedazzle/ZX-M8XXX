            const img2 = DidaktikLoader.deleteFile(img, hello);
            const l2 = DidaktikLoader.listFiles(img2);
            assert(!l2.find(f => f.name === 'HELLO'), 'deleted file gone from catalog');
            assert(!!l2.find(f => f.name === 'PROG'), 'sibling PROG survives delete');
            assert(DidaktikLoader.getFATnum(img2, 20) === 0x000 && DidaktikLoader.getFATnum(img2, 21) === 0x000,
                'deleted file FAT chain freed');
            const p = DidaktikLoader.extractFile(img2, l2.find(f => f.name === 'PROG'));
            assert(p && p.length === 256 && p[0] === 0x55, 'PROG data intact after sibling delete');
        }

        section('DidaktikLoader - rename / setStartAddr (write)');
        {
            const prog = files.find(f => f.name === 'PROG');
            const img2 = DidaktikLoader.renameFile(img, prog, 'RENAMED');
            const rf = DidaktikLoader.listFiles(img2).find(f => f.name === 'RENAMED');
            assert(!!rf && rf.firstSec === prog.firstSec, 'rename keeps the file (firstSec stable)');
            const img3 = DidaktikLoader.setStartAddr(img, prog.firstSec, 25);
            const sf = DidaktikLoader.listFiles(img3).find(f => f.firstSec === prog.firstSec);
            assert(sf && sf.startAddr === 25, 'setStartAddr updates the LINE/address field');
        }

        section('DidaktikLoader - swapDirEntries (reorder)');
        {
            const before = DidaktikLoader.listFiles(img);
            assert(before.length >= 2, 'have >= 2 files to reorder');
            const a = before[0], b = before[1];
            const img2 = DidaktikLoader.swapDirEntries(img, a.firstSec, b.firstSec);
            const after = DidaktikLoader.listFiles(img2);
            assert(after.length === before.length, 'file count unchanged after swap');
            assert(after[0].name === b.name && after[1].name === a.name, 'catalog order swapped');
            // data/FAT untouched: each file still extracts identically
            const da1 = DidaktikLoader.extractFile(img, a), da2 = DidaktikLoader.extractFile(img2, after.find(f => f.name === a.name));
            let same = da1 && da2 && da1.length === da2.length;
            if (same) for (let i = 0; i < da1.length; i++) if (da1[i] !== da2[i]) { same = false; break; }
            assert(same, 'file data intact after reorder (chains untouched)');
        }

        section('DidaktikLoader - CRUD lifecycle + spec byte layout');
        {
            const cmp = (a, b) => !!a && !!b && a.length === b.length && Array.from(a).every((x, i) => x === b[i]);

            // CREATE
            let d = new Uint8Array(img);
            const payload = new Uint8Array(700);
            for (let i = 0; i < 700; i++) payload[i] = (i * 9 + 3) & 0xFF;
            d = DidaktikLoader.addFile(d, { name: 'NEWF', type: 'B', data: payload, startAddr: 50000 });
            let nf = DidaktikLoader.listFiles(d).find(f => f.name === 'NEWF');
            assert(!!nf && nf.length === 700 && nf.type === 'B' && nf.startAddr === 50000, 'CREATE: file present with metadata');

            // READ
            assert(cmp(DidaktikLoader.extractFile(d, nf), payload), 'READ: extracts byte-identical');

            // Byte layout vs the documented MDOS directory entry (independent of round-trip)
            const off = DidaktikLoader._findDirEntry(d, nf.firstSec);
            assert(d[off] === 0x42, 'byte 0 = type char "B"');
            assert(String.fromCharCode(d[off + 1], d[off + 2], d[off + 3], d[off + 4]) === 'NEWF', 'bytes 1-4 = name');
            assert((d[off + 11] | (d[off + 12] << 8) | (d[off + 21] << 16)) === 700, 'bytes 11-12,21 = 24-bit length');
            assert((d[off + 13] | (d[off + 14] << 8)) === 50000, 'bytes 13-14 = start address');
            assert(d[off + 20] === 0x0F, 'byte 20 = attributes 0x0F');

            // UPDATE: rename + change address (data must survive)
            d = DidaktikLoader.renameFile(d, nf, 'RENF');
            d = DidaktikLoader.setStartAddr(d, nf.firstSec, 25000);
            const rf = DidaktikLoader.listFiles(d).find(f => f.firstSec === nf.firstSec);
            assert(rf && rf.name === 'RENF' && rf.startAddr === 25000, 'UPDATE: rename + setStartAddr applied');
            assert(cmp(DidaktikLoader.extractFile(d, rf), payload), 'UPDATE: data intact after edits');

            // UPDATE (reorder)
            const ord0 = DidaktikLoader.listFiles(d);
            d = DidaktikLoader.swapDirEntries(d, ord0[0].firstSec, ord0[1].firstSec);
            const ord1 = DidaktikLoader.listFiles(d);
            assert(ord1[0].name === ord0[1].name && ord1[1].name === ord0[0].name, 'UPDATE: reorder swaps order');

            // DELETE
            const countBefore = DidaktikLoader.listFiles(d).length;
            d = DidaktikLoader.deleteFile(d, { firstSec: nf.firstSec });
            assert(!DidaktikLoader.listFiles(d).find(f => f.firstSec === nf.firstSec), 'DELETE: file gone');
            assert(DidaktikLoader.getFATnum(d, nf.firstSec) === 0x000, 'DELETE: first sector freed in FAT');
            assert(DidaktikLoader.listFiles(d).length === countBefore - 1, 'DELETE: one fewer file');
        }

        section('DidaktikLoader - writer format fidelity');
        {
            // (a) full last sector → terminator is exactly 0xE00, exact round-trip
            const p1024 = new Uint8Array(1024);
            for (let i = 0; i < 1024; i++) p1024[i] = i & 0xFF;
            const imgF = DidaktikLoader.addFile(img, { name: 'FULL', type: 'B', data: p1024, startAddr: 0x8000 });
            const ff = DidaktikLoader.listFiles(imgF).find(f => f.name === 'FULL');
            assert(!!ff && ff.length === 1024, 'full-sector file length 1024');
            // walk to the last sector and confirm terminator == 0xE00
            let ls = ff.firstSec;
            while (DidaktikLoader.getFATnum(imgF, ls) < 0xC00) ls = DidaktikLoader.getFATnum(imgF, ls);
            assert(DidaktikLoader.getFATnum(imgF, ls) === 0xE00, 'exact-multiple last sector → 0xE00 terminator');
            const fd = DidaktikLoader.extractFile(imgF, ff);
            let fok = !!fd && fd.length === 1024;
            if (fok) for (let i = 0; i < 1024; i++) if (fd[i] !== (i & 0xFF)) { fok = false; break; }
            assert(fok, 'exact-multiple-of-512 file round-trips');

            // (b) new dir entry tail (bytes 22-31) filled with 0xE5 (matches tap2d80.cpp / real disks)
            const off = DidaktikLoader._findDirEntry(imgF, ff.firstSec);
            let tailOk = off >= 0;
            if (tailOk) for (let i = 22; i < 32; i++) if (imgF[off + i] !== 0xE5) { tailOk = false; break; }
            assert(tailOk, 'new directory entry tail 22-31 = 0xE5');

            // (c) >64KB file exercises the 3-byte length (morelength @ byte 21)
            const big = new Uint8Array(70000);
            for (let i = 0; i < 70000; i++) big[i] = (i * 3) & 0xFF;
            const imgB = DidaktikLoader.addFile(img, { name: 'BIG', type: 'B', data: big, startAddr: 0x8000 });
            const bf = DidaktikLoader.listFiles(imgB).find(f => f.name === 'BIG');
            assert(!!bf && bf.length === 70000, `>64KB length via 3-byte field (got ${bf ? bf.length : '?'})`);
            const bofs = DidaktikLoader._findDirEntry(imgB, bf.firstSec);
            assert(imgB[bofs + 21] === ((70000 >> 16) & 0xFF), 'morelength byte (21) holds high byte of length');
            const bd = DidaktikLoader.extractFile(imgB, bf);
            let bok = !!bd && bd.length === 70000;
            if (bok) for (let i = 0; i < 70000; i += 257) if (bd[i] !== ((i * 3) & 0xFF)) { bok = false; break; }
            assert(bok, '>64KB file round-trips');

            // (d) delete reclaims sectors for re-use
            const free1 = DidaktikLoader._freeSectors(img).length;
            const imgD = DidaktikLoader.deleteFile(img, files.find(f => f.name === 'HELLO'));
            const free2 = DidaktikLoader._freeSectors(imgD).length;
            assert(free2 > free1, `delete reclaims free sectors (${free1} → ${free2})`);
        }
    }

    // Delete + compaction across formats: build N files, rebuild with the middle one
    // dropped, and confirm the count falls, survivors stay intact and repack, and free
    // space is reclaimed. (DSK's mark-0xE5 delete is covered by the headless cross-check.)
    function runDeleteCompactionTests() {
        const data = (seed, len) => { const d = new Uint8Array(len); for (let i = 0; i < len; i++) d[i] = (seed + i) & 0xFF; return d; };
        const eq = (a, ref) => !!a && a.length === ref.length && Array.from(a).every((x, i) => x === ref[i]);
        const dA = data(0xA0, 200), dB = data(0xB0, 600), dC = data(0xC0, 100); // seeds > 7 so no false 9-byte-header detect

        section('Delete + compaction — TR-DOS (TRD)');
        {
            const F = (n, d, a) => ({ name: n, ext: 'C', length: d.length, startAddress: a, programLength: null, sectors: Math.ceil(d.length / 256), data: d });
            const full = TRDLoader.buildTRD([F('AAA', dA, 0x8000), F('BBB', dB, 0x9000), F('CCC', dC, 0xA000)], 'DELTRD');
            const freeFull = full[0x800 + 0xE5] | (full[0x800 + 0xE6] << 8);
            assert(TRDLoader.listFiles(full).length === 3, 'TRD: 3 files before delete');
            const comp = TRDLoader.buildTRD([F('AAA', dA, 0x8000), F('CCC', dC, 0xA000)], 'DELTRD'); // BBB removed
            const lc = TRDLoader.listFiles(comp);
            assert(lc.length === 2 && !lc.some(f => f.name.trim() === 'BBB'), 'TRD: middle file deleted');
            const c = lc.find(f => f.name.trim() === 'CCC');
            assert(c.track * 16 + c.sector === 17, 'TRD: survivor repacked into freed space (logical sector 17)');
            assert(eq(TRDLoader.extractFile(comp, c), dC), 'TRD: survivor data intact after compaction');
            const freeComp = comp[0x800 + 0xE5] | (comp[0x800 + 0xE6] << 8);
            assert(freeComp === freeFull + 3, `TRD: 3 sectors reclaimed (${freeFull} → ${freeComp})`);
            assert(comp[0x800 + 0xE4] === 2, 'TRD: sysinfo file count = 2');
        }

        section('Delete + compaction — TR-DOS soft delete (0x01 marker)');
        {
            const F = (n, d, a, del) => ({ name: n, ext: 'C', length: d.length, startAddress: a, programLength: null, sectors: 1, data: d, deleted: del });
            const soft = TRDLoader.buildTRD([F('AAA', dC, 0x8000, false), F('BBB', dC, 0x9000, true)], 'SOFT');
            assert(soft[16] === 0x01, 'TRD soft-delete: entry marked 0x01');
            assert(TRDLoader.listFiles(soft).length === 1, 'TRD soft-delete: deleted file not listed');
            assert(soft[0x800 + 0xE4] === 1, 'TRD soft-delete: file count excludes it');
        }

        section('Delete + compaction — SCL');
        {
            const F = (n, d, a) => ({ name: n, ext: 'C', length: d.length, startAddress: a, programLength: null, sectors: Math.ceil(d.length / 256), data: d });
            const full = SCLLoader.buildSCL([F('AAA', dA, 0x8000), F('BBB', dB, 0x9000), F('CCC', dC, 0xA000)]);
            assert(SCLLoader.listFiles(full).length === 3, 'SCL: 3 files before delete');
            const comp = SCLLoader.buildSCL([F('AAA', dA, 0x8000), { ...F('BBB', dB, 0x9000), deleted: true }, F('CCC', dC, 0xA000)]);
            const lc = SCLLoader.listFiles(comp);
            assert(lc.length === 2 && !lc.some(f => f.name.trim() === 'BBB'), 'SCL: deleted file dropped');
            assert(eq(SCLLoader.extractFile(comp, lc.find(f => f.name.trim() === 'CCC')), dC), 'SCL: survivor data intact');
            assert(comp.length < full.length, 'SCL: archive compacted (smaller)');
        }

        section('Delete + compaction — MGT (+D)');
        {
            const F = (n, d, a) => ({ name: n, data: d, startAddress: a });
            const full = MGTLoader.buildMGT([F('AAA', dA, 0x8000), F('BBB', dB, 0x9000), F('CCC', dC, 0xA000)], 'DELMGT');
            const freeFull = MGTLoader.getDiskInfo(full).freeSectors;
            assert(MGTLoader.listFiles(full).length === 3, 'MGT: 3 files before delete');
            const comp = MGTLoader.buildMGT([F('AAA', dA, 0x8000), F('CCC', dC, 0xA000)], 'DELMGT');
            const lc = MGTLoader.listFiles(comp);
            assert(lc.length === 2 && !lc.some(f => (f.name || '').trim() === 'BBB'), 'MGT: deleted file gone');
            assert(eq(MGTLoader.extractFile(comp, lc.find(f => (f.name || '').trim() === 'CCC')), dC), 'MGT: survivor data intact');
            assert(MGTLoader.getDiskInfo(comp).freeSectors > freeFull, 'MGT: free sectors reclaimed');
        }

        section('Delete + compaction — Microdrive (MDR)');
        {
            const F = (n, d) => ({ name: n, data: d, isPrint: false });
            const full = MDRLoader.buildMDR([F('AAA', dA), F('BBB', dB), F('CCC', dC)], 'DELMDR');
            assert(MDRLoader.listFiles(full).length === 3, 'MDR: 3 files before delete');
            const comp = MDRLoader.buildMDR([F('AAA', dA), F('CCC', dC)], 'DELMDR');
            const lc = MDRLoader.listFiles(comp);
            assert(lc.length === 2 && !lc.some(f => (f.name || '').trim() === 'BBB'), 'MDR: deleted file gone');
            assert(eq(MDRLoader.extractFile(comp, lc.find(f => (f.name || '').trim() === 'CCC')), dC), 'MDR: survivor data intact');
        }

        section('Delete + compaction — OPD (Opus)');
        {
            const F = (n, d, a) => ({ name: n, type: 3, data: d, startAddr: a, autostart: 0 });
            const full = OPDLoader.buildOPD([F('AAA', dA, 0x8000), F('BBB', dB, 0x9000), F('CCC', dC, 0xA000)], 'DELOPD', 1);
            const freeFull = OPDLoader.getDiskInfo(full).freeSectors;
            assert(OPDLoader.listFiles(full).length === 3, 'OPD: 3 files before delete');
            const comp = OPDLoader.buildOPD([F('AAA', dA, 0x8000), F('CCC', dC, 0xA000)], 'DELOPD', 1);
            const lc = OPDLoader.listFiles(comp);
            assert(lc.length === 2 && !lc.some(f => (f.name || '').trim() === 'BBB'), 'OPD: deleted file gone');
            assert(eq(OPDLoader.extractFile(comp, lc.find(f => (f.name || '').trim() === 'CCC')), dC), 'OPD: survivor data intact');
            assert(OPDLoader.getDiskInfo(comp).freeSectors > freeFull, 'OPD: free sectors reclaimed');
        }
    }

    // Keep-slack copy (Explorer "Keep slack" / "bin full sectors"): the load-bearing
    // guarantees are (1) buildTRD writes & a rebuild preserves a CODE file's last-sector
    // slack, and (2) the cut-to-target-room fill (applyKeptSlack) carries slack to a
    // destination, truncated to the target's own last-sector room (never bloats).
    function runSlackTests() {
        const eq = (a, ref) => !!a && a.length === ref.length && Array.from(a).every((x, i) => x === ref[i]);
        // Mirror of ui/explorer.js applyKeptSlack
        const applyKeptSlack = (entry, slack) => {
            if (!slack || !slack.length || !entry.data) return;
            const room = entry.data.length - entry.length;
            if (room <= 0) return;
            entry.data.set(slack.subarray(0, room), entry.length);
        };

        section('Keep slack — TR-DOS last-sector preserved through buildTRD');
        {
            const logical = 300, secs = 2;
            const padded = new Uint8Array(secs * 256);
            for (let i = 0; i < logical; i++) padded[i] = (0xC0 + i) & 0xFF;
            const slackPattern = new Uint8Array(secs * 256 - logical);
            for (let i = 0; i < slackPattern.length; i++) slackPattern[i] = (0x5A + i) & 0xFF;
            padded.set(slackPattern, logical);
            const F = (n, d, len, a) => ({ name: n, ext: 'C', length: len, startAddress: a, programLength: null, sectors: Math.ceil(d.length / 256), data: d });
            const srcTrd = TRDLoader.buildTRD([F('SLK', padded, logical, 0x8000)], 'SLACK');
            const sl = TRDLoader.listFiles(srcTrd);
            const off = (sl[0].track * 16 + sl[0].sector) * 256;
            const fullRead = srcTrd.slice(off, off + sl[0].sectors * 256);
            assert(eq(fullRead.slice(logical), slackPattern), 'TRD: buildTRD writes & preserves last-sector slack');
            assert(eq(TRDLoader.extractFile(srcTrd, sl[0]), padded.slice(0, logical)), 'TRD: logical extract still drops slack');
            assert(eq(padded.slice(logical, secs * 256), slackPattern), 'TRD: source carry = data.slice(length, sectors*256)');
        }

        section('Keep slack — cut to the target last-sector room (no bloat)');
        {
            const tgtLogical = 412;                       // 2 sectors (512) -> room = 100
            const entry = { length: tgtLogical, data: new Uint8Array(Math.ceil(tgtLogical / 256) * 256) };
            const room = entry.data.length - entry.length;
            const srcSlack = new Uint8Array(212);          // larger than the target room
            for (let i = 0; i < srcSlack.length; i++) srcSlack[i] = (i + 1) & 0xFF;
            applyKeptSlack(entry, srcSlack);
            assert(room === 100, 'cut: target room computed (512 - 412)');
            assert(eq(entry.data.slice(tgtLogical), srcSlack.subarray(0, room)), 'cut: only the first 100 slack bytes kept');
            assert(entry.data.length === 512, 'cut: allocation not bloated (still 2 sectors)');
        }

        section('Keep slack — same-size target keeps all slack');
        {
            const len = 300;
            const entry = { length: len, data: new Uint8Array(512) };
            const srcSlack = new Uint8Array(512 - len);
            for (let i = 0; i < srcSlack.length; i++) srcSlack[i] = (0xE0 + i) & 0xFF;
            applyKeptSlack(entry, srcSlack);
            assert(eq(entry.data.slice(len), srcSlack), 'same-size: all slack bytes preserved');
        }
    }

    // ========== TR-DOS/SCL file copy (monoloader, any type) ==========
    // Drives the real Edit-tab copy helpers (ui/disk-file-copy.js): the path that
    // copies a file from one disk panel to another. Mirrors diskEditorAddFile's
    // field assembly (sector count + zero-pad) so the monoloader logic itself is
    // the real code; the rule is type-agnostic — CODE/DATA tails count too.
    function copyTrdEntry(srcFile, opts = {}) {
        const desc = extractTrdFileDescriptor(srcFile, opts); // src model -> descriptor (scl->trd is identity)
        const meta = addMetaFromDescriptor(desc);
        let fileData = desc.rawData, startField = desc.addr, lengthField = desc.rawData.length, progLenField = null;
        if (desc.ext === 'B') {
            const shaped = shapeBasicEntry(desc.rawData, meta);
            fileData = shaped.data; startField = 0; lengthField = shaped.length; progLenField = shaped.programLength;
        } else if (meta.verbatim) {
            startField = (meta.startAddress != null) ? meta.startAddress : desc.addr;
            lengthField = (meta.length != null) ? meta.length : desc.rawData.length;
        }
        const sectors = Math.ceil(fileData.length / 256);
        const data = new Uint8Array(sectors * 256);
        data.set(fileData);
        return { ext: desc.ext, startAddress: startField, length: lengthField,
                 programLength: progLenField, sectors, data, desc };
    }

    function bytesEqual(a, b) {
        if (a.length !== b.length) return false;
        for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
        return true;
    }

    function runMonoloaderCopyTests() {
        section('TR-DOS/SCL file copy — monoloader (any type)');

        // BASIC monoloader: 89-byte BASIC loader declared, but 23 sectors
        // allocated (5888 B) with appended CODE. The user's ASC2_9.SCL shape.
        const monoData = new Uint8Array(23 * 256);
        for (let i = 0; i < monoData.length; i++) monoData[i] = (i * 7 + 13) & 0xFF; // recognisable pattern
        monoData[80] = 0x80; monoData[81] = 0xAA; monoData[82] = 10; monoData[83] = 0; // autostart trailer (line 10)
        const monoSrc = { name: 'ASCREEN!', ext: 'B', startAddress: 0, length: 89, programLength: 89, sectors: 23, data: monoData };

        assert(isMonoloader(89, 23), 'monoloader detected (89 B declared, 23 sectors)');
        const m = copyTrdEntry(monoSrc);
        assert(!!m.desc.verbatim, 'BASIC monoloader extracted with verbatim flag');
        assert(m.sectors === 23, `copy keeps all 23 sectors (got ${m.sectors})`);
        assert(m.length === 89, `copy keeps catalogue length 89 (got ${m.length})`);
        assert(m.programLength === 89, `copy keeps programLength 89 (got ${m.programLength})`);
        assert(bytesEqual(m.data, monoData), 'BASIC copy is byte-identical to the source allocation (payload preserved)');

        // CODE monoloader: a 'C' file declaring 89 B at 0x8000 but allocating 23
        // sectors with an appended payload — must also copy whole + keep start/len.
        const codeData = new Uint8Array(23 * 256);
        for (let i = 0; i < codeData.length; i++) codeData[i] = (i * 11 + 5) & 0xFF;
        const codeSrc = { name: 'GAME', ext: 'C', startAddress: 0x8000, length: 89, programLength: null, sectors: 23, data: codeData };

        const c = copyTrdEntry(codeSrc);
        assert(!!c.desc.verbatim, 'CODE monoloader extracted with verbatim flag');
        assert(c.ext === 'C', 'CODE monoloader keeps its C type');
        assert(c.sectors === 23, `CODE copy keeps all 23 sectors (got ${c.sectors})`);
        assert(c.length === 89, `CODE copy keeps catalogue length 89 (got ${c.length})`);
        assert(c.startAddress === 0x8000, `CODE copy keeps start address 0x8000 (got ${c.startAddress.toString(16)})`);
        assert(bytesEqual(c.data, codeData), 'CODE copy is byte-identical to the source allocation (payload preserved)');

        // Negative: a normal BASIC file (length fits its sectors) must NOT be
        // treated as a monoloader, and round-trips program+vars + trailer.
        const progVars = new Uint8Array(300); // 2 sectors, no appended CODE
        for (let i = 0; i < progVars.length; i++) progVars[i] = (i * 3 + 1) & 0xFF;
        progVars[300 - 4] = 0x80; progVars[300 - 3] = 0xAA; progVars[300 - 2] = 20; progVars[300 - 1] = 0;
        const normData = new Uint8Array(2 * 256); normData.set(progVars);
        const normSrc = { name: 'LOADER', ext: 'B', startAddress: 0, length: 300, programLength: 200, sectors: 2, data: normData };

        assert(!isMonoloader(300, 2), 'normal BASIC not flagged as monoloader (300 B in 2 sectors)');
        const n = copyTrdEntry(normSrc);
        assert(!n.desc.verbatim, 'normal BASIC extracted without verbatim');
        assert(n.length === 300, `normal BASIC length preserved (got ${n.length})`);
        assert(n.programLength === 200, `normal BASIC vars offset preserved (got ${n.programLength})`);
        assert(trdBasicAutostartLine(n.data) === 20, 'normal BASIC autostart trailer survives the round-trip');

        // Negative: a normal CODE file slices to its declared length as before.
        const ncData = new Uint8Array(2 * 256);
        for (let i = 0; i < ncData.length; i++) ncData[i] = (i + 1) & 0xFF;
        const ncSrc = { name: 'CHUNK', ext: 'C', startAddress: 0x6000, length: 400, programLength: null, sectors: 2, data: ncData };
        const nc = copyTrdEntry(ncSrc);
        assert(!nc.desc.verbatim, 'normal CODE extracted without verbatim');
        assert(nc.length === 400, `normal CODE length preserved (got ${nc.length})`);
        assert(nc.startAddress === 0x6000, 'normal CODE start address preserved');

        // Edge: declared length exactly fills its sectors (boundary, not mono).
        assert(!isMonoloader(512, 2), 'length on exact sector boundary is not a monoloader');
        assert(isMonoloader(89, 2), 'one extra empty sector still counts as monoloader (carried verbatim)');

        // Split (RE helper): monoloader -> loader (declared length) + appended CODE.
        const sp = splitMonoloader(monoSrc); // BASIC, length 89, 23 sectors
        assert(sp.loader.ext === 'B' && sp.loader.length === 89, 'split loader keeps BASIC type + declared length 89');
        assert(sp.loader.sectors === 1, `split loader is 1 sector (got ${sp.loader.sectors})`);
        assert(sp.payload.ext === 'C', 'split payload is a CODE entry');
        assert(sp.payload.startAddress === 0, 'split payload start address is unknown (0)');
        assert(sp.payload.length === 23 * 256 - 89, `split payload length = allocation - declared (got ${sp.payload.length})`);
        const recon = new Uint8Array(23 * 256);
        recon.set(sp.loader.data.subarray(0, sp.loader.length), 0);
        recon.set(sp.payload.data.subarray(0, sp.payload.length), sp.loader.length);
        assert(bytesEqual(recon, monoData), 'loader + payload reconstruct the source allocation (split is lossless)');

        // Split a CODE monoloader too: payload keeps type C, loader keeps its start.
        const spc = splitMonoloader(codeSrc); // CODE @0x8000, length 89, 23 sectors
        assert(spc.loader.ext === 'C' && spc.loader.startAddress === 0x8000, 'split CODE loader keeps C type + start 0x8000');
        assert(spc.payload.ext === 'C' && spc.payload.length === 23 * 256 - 89, 'split CODE payload is the remaining allocation');
    }

    function runBannerTests() {
        section('SPECSCII catalogue banner (core/specscii.js)');

        // ---- Stream parsing ----
        const stream = Uint8Array.from([
            0x10, 2, 0x11, 6, 0x13, 1,   // INK 2, PAPER 6, BRIGHT 1
            0x41, 0x42,                  // "AB" at (0,0),(0,1)
            0x16, 5, 0, 0x8F,            // AT 5,0 + solid block
            0x0D,                        // newline -> (6,0)
            0x14, 1, 0x43                // INVERSE 1, "C" (ink/paper swapped)
        ]);
        const parsed = parseSpecscii(stream);
        assert(parsed.cellCount === 4, `parse: 4 cells (got ${parsed.cellCount})`);
        const a = parsed.grid[0][0];
        assert(a && a.ch === 0x41 && a.ink === 2 && a.paper === 6 && a.bright === 1,
            'parse: "A" carries INK 2 PAPER 6 BRIGHT 1');
        assert(parsed.grid[5][0] && parsed.grid[5][0].ch === 0x8F, 'parse: AT 5,0 places the block');
        const cInv = parsed.grid[6][0];
        assert(cInv && cInv.ch === 0x43 && cInv.ink === 6 && cInv.paper === 2,
            'parse: ENTER breaks the line, INVERSE swaps ink/paper');

        // ---- isBannerName ----
        assert(isBannerName(Uint8Array.from([0x16, 0, 0, 0x11, 2, 0x8B, 0x83, 0x83])), 'isBannerName: Deja Vu style entry detected');
        assert(!isBannerName(Uint8Array.from('boot    '.split('').map(c => c.charCodeAt(0)))), 'isBannerName: plain filename passes');

        // ---- Encoder round-trip through a simulated TR-DOS LIST ----
        // Torture grid: 5 rows of text/blocks with heavy attribute churn.
        const ROWS = 5;
        const grid = [];
        for (let r = 0; r < 24; r++) grid.push(new Array(32).fill(null));
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < 32; c++) {
                const kind = (r * 13 + c * 7) % 4;
                const ch = kind === 0 ? 0x20 : kind === 1 ? 0x41 + ((r * 7 + c) % 26) : kind === 2 ? 0x80 + ((r + c) & 15) : 0x8F;
                grid[r][c] = { ch, ink: (r * 3 + c) & 7, paper: (c >> 2) & 7, bright: r & 1, flash: ((r * c) % 13 === 0) ? 1 : 0 };
            }
        }
        assert(lastContentRow(grid) === ROWS - 1, `lastContentRow finds row ${ROWS - 1}`);

        const { names } = encodeBannerEntries(grid, ROWS);
        assert(names.every(n => n.length === 8), 'encode: every entry name is exactly 8 bytes');
        assert(names.every(n => n[0] === 0x16), 'encode: every entry starts with AT');
        assert(names.every(n => n[1] <= BANNER_MAX_ROWS), 'encode: AT rows stay in the upper screen');
        assert(names.length <= 126, `encode: ${names.length} entries for a 5-row banner (leaves room for files)`);
        log(`  5-row torture banner: ${names.length} entries`, 'info');

        // Simulate what LIST paints, including the junk columns after each entry
        const sim = simulateListPrint(names);
        const relevant = (ch) => ch === 0x20 ? ['paper', 'bright', 'flash'] : ch === 0x8F ? ['ink', 'bright', 'flash'] : ['ink', 'paper', 'bright', 'flash'];
        let mismatches = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < 32; c++) {
                const want = grid[r][c];
                const got = sim.grid[r][c];
                if (!got || got.ch !== want.ch) { mismatches++; continue; }
                for (const k of relevant(want.ch)) if (got[k] !== want[k]) { mismatches++; break; }
            }
        }
        assert(mismatches === 0, `simulated LIST reproduces all ${ROWS * 32} banner cells (${mismatches} mismatches)`);
        // Reset entries: the junk row prints black-on-white, rows below stay clean
        const junkRow = sim.grid[ROWS];
        const junkCells = junkRow.filter(Boolean);
        assert(junkCells.length > 0, 'junk row exists below the banner (authentic LIST leftover)');
        assert(junkCells.every(cell => cell.ink === 0 && cell.paper === 7 && cell.bright === 0 && cell.flash === 0),
            'reset entries: junk row prints ink 0 / paper 7, flash+bright off');
        assert(sim.grid[ROWS + 1].every(cell => cell === null), 'nothing painted below the junk row');

        // Row limit is enforced (AT upper-screen limit)
        let threw = false;
        try { encodeBannerEntries(grid, BANNER_MAX_ROWS + 1); } catch (e) { threw = true; }
        assert(threw, `encode rejects more than ${BANNER_MAX_ROWS} rows`);

        // ---- TRD build round-trip ----
        const fdata = new Uint8Array(512).fill(0xAB);
        const files = [{ name: 'boot    ', ext: 'B', length: 300, startAddress: 0, programLength: 300, sectors: 2, data: fdata, deleted: false }];
        const trd = TRDLoader.buildTRD(files, 'BANNER', names);
        let ok = true;
        for (let i = 0; i < names.length; i++) {
            for (let b = 0; b < 8; b++) if (trd[i * 16 + b] !== names[i][b]) ok = false;
            if (trd[i * 16 + 8] !== 0x20) ok = false;             // type: space
            if (trd[i * 16 + 13] !== 0) ok = false;               // zero sectors
        }
        assert(ok, 'buildTRD: banner entries verbatim before the files, type space, zero sectors');
        const bootOff = names.length * 16;
        assert(String.fromCharCode(...trd.slice(bootOff, bootOff + 8)) === 'boot    ' && trd[bootOff + 8] === 0x42,
            'buildTRD: real file entry follows the banner');
        assert(trd[bootOff + 14] === 0 && trd[bootOff + 15] === 1, 'buildTRD: file data still starts at track 1');
        assert(trd[16 * 256] === 0xAB, 'buildTRD: file data written at track 1');
        assert(trd[0x800 + 0xE4] === names.length + 1, 'buildTRD: sysinfo counts banner entries (like Deja Vu #0A)');
        assert((trd[0x800 + 0xE5] | (trd[0x800 + 0xE6] << 8)) === 2560 - 16 - 2, 'buildTRD: banner consumes no free sectors');

        // Reconstruct the banner from the raw catalogue and compare pictures
        const namesBack = [];
        for (let i = 0; i < 128; i++) {
            if (trd[i * 16] === 0) break;
            const nm = trd.slice(i * 16, i * 16 + 8);
            if (isBannerName(nm)) namesBack.push(Uint8Array.from(nm));
        }
        assert(namesBack.length === names.length, 'TRD catalogue: all banner entries recognised by isBannerName');
        const back = decodeBannerNames(namesBack).grid;
        const orig = decodeBannerNames(names).grid;
        let backOk = true;
        for (let r = 0; r < 24; r++) for (let c = 0; c < 32; c++) {
            const x = orig[r][c], y = back[r][c];
            if ((x === null) !== (y === null)) { backOk = false; continue; }
            if (x && (x.ch !== y.ch || x.ink !== y.ink || x.paper !== y.paper || x.bright !== y.bright || x.flash !== y.flash)) backOk = false;
        }
        assert(backOk, 'banner decoded from the built TRD matches the encoded picture');

        // ---- SCL build ----
        const scl = SCLLoader.buildSCL(files, names);
        assert(scl[8] === names.length + 1, 'buildSCL: header counts banner + files');
        let sclOk = true;
        for (let i = 0; i < names.length; i++) {
            const off = 9 + i * 14;
            for (let b = 0; b < 8; b++) if (scl[off + b] !== names[i][b]) sclOk = false;
            if (scl[off + 8] !== 0x20 || scl[off + 13] !== 0) sclOk = false;
        }
        assert(sclOk, 'buildSCL: banner entries verbatim, type space, zero sectors');
        const fileOff = 9 + names.length * 14;
        assert(String.fromCharCode(...scl.slice(fileOff, fileOff + 8)) === 'boot    ', 'buildSCL: file entry follows the banner');
        assert(scl.length === 9 + (names.length + 1) * 14 + 512 + 4, 'buildSCL: banner adds headers only, no data blocks');
    }

    function runAll() {
        logEl.innerHTML = '';
        passed = 0;
        failed = 0;
        try { runTapeLoaderTests(); } catch(e) { log(`ERROR in TapeLoader: ${e.message}`, 'fail'); }
        try { runBetaDiskBasicTests(); } catch(e) { log(`ERROR in BetaDisk Basic: ${e.message}`, 'fail'); }
        try { runBetaDiskCommandTests(); } catch(e) { log(`ERROR in BetaDisk Commands: ${e.message}`, 'fail'); }
        try { runBetaDiskDataTests(); } catch(e) { log(`ERROR in BetaDisk Data: ${e.message}`, 'fail'); }
        try { runPlusDDiskTests(); } catch(e) { log(`ERROR in PlusDDisk: ${e.message}`, 'fail'); }
