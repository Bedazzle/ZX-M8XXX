        const reads = [];
        for (let attempt = 0; attempt < 10; attempt++) {
            fdcW.reset();
            fdcW.drives[0].disk = weakImg;
            fdcW.drives[0].motorOn = true;
            fdcW.drives[0].track = 0;
            fdcCommand(fdcW, [0x03, 0xDF, 0x02]);

            fdcW.writeData(0x46); // Read Data
            fdcW.writeData(0x00);
            fdcW.writeData(0x00);
            fdcW.writeData(0x00);
            fdcW.writeData(0xC1);
            fdcW.writeData(0x02);
            fdcW.writeData(0xC1);
            fdcW.writeData(0x1B);
            fdcW.writeData(0xFF);

            const data = fdcReadAllData(fdcW);
            fdcCollectResult(fdcW);
            reads.push(data[100]); // weak byte position
        }

        // Stable byte should be consistent across all reads
        // (Read byte 0 once to verify)
        fdcW.reset();
        fdcW.drives[0].disk = weakImg;
        fdcW.drives[0].motorOn = true;
        fdcW.drives[0].track = 0;
        fdcCommand(fdcW, [0x03, 0xDF, 0x02]);
        fdcW.writeData(0x46);
        fdcW.writeData(0x00);
        fdcW.writeData(0x00);
        fdcW.writeData(0x00);
        fdcW.writeData(0xC1);
        fdcW.writeData(0x02);
        fdcW.writeData(0xC1);
        fdcW.writeData(0x1B);
        fdcW.writeData(0xFF);
        const finalData = fdcReadAllData(fdcW);
        fdcCollectResult(fdcW);
        assert(finalData[0] === 0xAA, 'weak: stable byte 0 always = 0xAA');

        // Weak byte should have at least some variation across 10 reads
        // (extremely unlikely to get same random value 10 times: (1/256)^9 ≈ 0)
        const uniqueValues = new Set(reads);
        assert(uniqueValues.size >= 2, `weak: byte 100 varies across reads (${uniqueValues.size} unique values in 10 reads)`);

        section('Weak sector - stable bytes unchanged');

        // Verify all non-weak bytes are identical across reads
        fdcW.reset();
        fdcW.drives[0].disk = weakImg;
        fdcW.drives[0].motorOn = true;
        fdcW.drives[0].track = 0;
        fdcCommand(fdcW, [0x03, 0xDF, 0x02]);
        fdcW.writeData(0x46);
        fdcW.writeData(0x00);
        fdcW.writeData(0x00);
        fdcW.writeData(0x00);
        fdcW.writeData(0xC1);
        fdcW.writeData(0x02);
        fdcW.writeData(0xC1);
        fdcW.writeData(0x1B);
        fdcW.writeData(0xFF);
        const stableCheck = fdcReadAllData(fdcW);
        fdcCollectResult(fdcW);

        let allStableCorrect = true;
        for (let i = 0; i < 512; i++) {
            if (i === 100) continue; // skip weak byte
            if (stableCheck[i] !== 0xAA) { allStableCorrect = false; break; }
        }
        assert(allStableCorrect, 'weak: all non-weak bytes are stable (0xAA)');

        updateSummary();
    }

    // ═══════════════════════════════════════════════════════
    // Copy Protection Detection Tests
    // ═══════════════════════════════════════════════════════

    // Duplicated from explorer.js (pure functions, no DOM deps)
    function findStringInSector(data, str) {
        if (!data || data.length < str.length) return -1;
        const len = data.length - str.length + 1;
        outer:
        for (let i = 0; i < len; i++) {
            for (let j = 0; j < str.length; j++) {
                if (data[i + j] !== str.charCodeAt(j)) continue outer;
            }
            return i;
        }
        return -1;
    }

    function detectDiskProtection(dskImage) {
        if (!dskImage || dskImage.numTracks === 0) return null;

        let uniform = true;
        let hasErrors = false;
        const t0 = dskImage.getTrack(0, 0);
        if (!t0) return null;
        const refCount = t0.sectors.length;
        const refSize = refCount > 0 ? t0.sectors[0].sizeCode : -1;

        for (let cyl = 0; cyl < dskImage.numTracks; cyl++) {
            for (let head = 0; head < dskImage.numSides; head++) {
                const track = dskImage.getTrack(cyl, head);
                if (!track) { uniform = false; continue; }
                if (track.sectors.length !== refCount) uniform = false;
                for (const sec of track.sectors) {
                    if (sec.sizeCode !== refSize) uniform = false;
                    if (sec.st1 || sec.st2) hasErrors = true;
                }
            }
        }

        if (uniform && !hasErrors) return null;

        function getTrack(cyl, head) {
            if (cyl >= dskImage.numTracks) return null;
            if (head >= dskImage.numSides) return null;
            return dskImage.getTrack(cyl, head);
        }

        function findInTrack(cyl, head, str) {
            const t = getTrack(cyl, head);
            if (!t) return false;
            for (const sec of t.sectors) {
                if (sec.data && findStringInSector(sec.data, str) >= 0) return true;
            }
            return false;
        }

        function findInSectorIdx(cyl, head, idx, str) {
            const t = getTrack(cyl, head);
            if (!t || idx >= t.sectors.length) return false;
            return t.sectors[idx].data && findStringInSector(t.sectors[idx].data, str) >= 0;
        }

        function detectAlkatraz() {
            if (findInTrack(0, 0, 'THE ALKATRAZ PROTECTION SYSTEM')) return 'Alkatraz';
            for (let cyl = 0; cyl < dskImage.numTracks; cyl++) {
                for (let head = 0; head < dskImage.numSides; head++) {
                    const t = getTrack(cyl, head);
                    if (t && t.sectors.length === 18 && t.sectors[0].sizeCode === 1) return 'Alkatraz';
                }
            }
            return null;
        }

        function detectFrontier() {
            if (findInTrack(1, 0, 'W DISK PROTECTION SYSTEM. (C) 1990 BY NEW FRONTIER SOFT.'))
                return 'Frontier';
            const t9 = getTrack(9, 0);
            if (t9 && t9.sectors.length === 1 && t0.sectors.length > 0 && t0.sectors[0].data && t0.sectors[0].data.length === 4096)
                return 'Frontier';
            return null;
        }

        function detectHexagon() {
            for (let cyl = 0; cyl <= 3 && cyl < dskImage.numTracks; cyl++) {
                if (findInTrack(cyl, 0, 'HEXAGON DISK PROTECTION c 1989')) return 'Hexagon';
                if (findInTrack(cyl, 0, 'HEXAGON Disk Protection c 1989')) return 'Hexagon';
            }
            if (t0.sectors.length === 10) {
                for (let cyl = 1; cyl < dskImage.numTracks; cyl++) {
                    const t = getTrack(cyl, 0);
                    if (t && t.sectors.length === 1 && t.sectors[0].sizeCode === 6
                        && t.sectors[0].st1 === 32 && t.sectors[0].st2 === 96)
                        return `Hexagon (T${cyl}/S0)`;
                }
            }
            return null;
        }

        function detectPaulOwens() {
            if (findInSectorIdx(0, 0, 2, 'PAUL OWENS\x80PROTECTION SYS')) return 'Paul Owens';
            const t1 = getTrack(1, 0);
            const t2 = getTrack(2, 0);
            if (t0.sectors.length === 9 && t1 && t1.sectors.length === 0
                && t2 && t2.sectors.length === 6 && t2.sectors[0].sizeCode === 1)
                return 'Paul Owens';
            return null;
        }

        function detectSpeedlock() {
            const sigTests = [
                ['Speedlock 1985', 'Speedlock +3 Protection Systems  (C) 1985 Speedlock Associates'],
                ['Speedlock 1986', 'Speedlock +3 Protection System  (C) 1986 Speedlock Associates'],
                ['Speedlock 1986', 'SPEEDLOCK +3 PROTECTION SYSTEM (C) 1986 SPEEDLOCK ASSOCIATES'],
                ['Speedlock 1987', 'Speedlock +3 Protection Systems (C) 1987  D.Love & D.Maybury'],
                ['Speedlock 1987', 'SPEEDLOCK +3 PROTECTION SYSTEM (C) 1987 SPEEDLOCK ASSOCIATES'],
                ['Speedlock 1988', 'Speedlock +3 Protection System (C)1988 Speedlock Associates.'],
                ['Speedlock 1988', 'SPEEDLOCK +3 PROTECTION SYSTEM (C) 1988 SPEEDLOCK ASSOCIATES'],
                ['Speedlock 1989', 'SPEEDLOCK +3 DISC PROTECTION SYSTEMS (C) 1989 SPEEDLOCK ASSOC.'],
                ['Speedlock 1989', 'SPEEDLOCK +3 DISC PROTECTION SYSTEM(C) 1989 SPEEDLOCK ASSOCS.'],
                ['Speedlock 1990', 'SPEEDLOCK DISC PROTECTION SYSTEM (C)1990 SPEEDLOCK ASSOCIATES'],
            ];
            for (const [name, sig] of sigTests) {
                for (let cyl = 0; cyl < Math.min(dskImage.numTracks, 5); cyl++) {
                    if (findInTrack(cyl, 0, sig)) return name;
                }
            }
            const t1 = getTrack(1, 0);
            if (t0.sectors.length === 9 && t1 && t1.sectors.length === 5 && t1.sectors[0].sizeCode === 3) {
                if (t0.sectors.length > 8 && t0.sectors[6].st2 === 64 && t0.sectors[8].st2 === 0)
                    return 'Speedlock +3 1987';
                if (t0.sectors.length > 8 && t0.sectors[6].st2 === 64 && t0.sectors[8].st2 === 64)
                    return 'Speedlock +3 1988';
            }
            if (t0.sectors.length > 7 && t1 && t1.sectors.length === 1
                && t1.sectors[0].id === 193 && t1.sectors[0].st1 === 32)
                return 'Speedlock 1989/1990';
            return null;
        }

        function detectThreeInch() {
            const sigs = [
                [0, 0, 0, '***Loader Copyright Three Inch Software 1988'],
                [0, 0, 7, '***Loader Copyright Three Inch Software 1988'],
                [1, 0, 4, '***Loader Copyright Three Inch Software 1988'],
                [0, 0, 0, '***Loader (c) Three Inch Software 1988'],
            ];
            for (const [cyl, head, idx, sig] of sigs) {
                if (findInSectorIdx(cyl, head, idx, sig)) return 'Three Inch Loader';
            }
            return null;
        }

        function detectLaserLoad() {
            if (findInSectorIdx(0, 0, 2, 'Laser Load   By C.J.Pink For Consult Computer    Systems'))
                return 'Laser Load';
            return null;
        }

        function detectWRM() {
            const t8 = getTrack(8, 0);
            if (t8 && t8.sectors.length > 9 && t8.sectors[9].data) {
                const d = t8.sectors[9].data;
                if (findStringInSector(d, 'W.R.M Disc') >= 0
                    && findStringInSector(d, 'Protection') >= 0
                    && findStringInSector(d, 'System (c) 1987') >= 0)
                    return 'W.R.M.';
            }
            return null;
        }

        function detectPMS() {
            if (findInTrack(0, 0, '[C] P.M.S. 1986')) return 'P.M.S.';
            if (findInTrack(0, 0, 'P.M.S. LOADER [C]1986')) return 'P.M.S.';
            if (findInTrack(0, 0, '[C]P.M.S.1986')) return 'P.M.S.';
            if (findInTrack(0, 0, 'P.M.S. PROTECTION [C]1986')) return 'P.M.S.';
            const t1 = getTrack(1, 0);
            const t2 = getTrack(2, 0);
            if (t0.sectors.length > 0 && t1 && t1.sectors.length === 0
                && t2 && t2.sectors.length > 0)
                return 'P.M.S.';
            return null;
        }

        function detectPlayers() {
            for (let cyl = 0; cyl < dskImage.numTracks; cyl++) {
                for (let head = 0; head < dskImage.numSides; head++) {
                    const t = getTrack(cyl, head);
                    if (!t || t.sectors.length !== 16) continue;
                    let match = true;
                    for (let i = 0; i < 16; i++) {
                        if (t.sectors[i].id !== i || t.sectors[i].sizeCode !== i) { match = false; break; }
                    }
                    if (match) return 'Players';
                }
            }
            return null;
        }

        function detectInfogrames() {
            const t39 = getTrack(39, 0);
            if (t39) {
                for (const sec of t39.sectors) {
                    if (sec.sizeCode === 2 && sec.data && sec.data.length === 540)
                        return 'Infogrames';
                }
            }
            return null;
        }

        function detectRainbowArts() {
            const t40 = getTrack(40, 0);
            if (t40) {
                for (const sec of t40.sectors) {
                    if (sec.id === 198 && sec.st1 === 32 && sec.st2 === 32)
                        return 'Rainbow Arts';
                }
            }
            return null;
        }

        function detectRemiKBI() {
            const parts = [];
            for (let cyl = 0; cyl < dskImage.numTracks; cyl++) {
                if (findInTrack(cyl, 0, 'PROTECTION      Remi HERBULOT')) {
                    parts.push('Remi Herbulot');
                    break;
                }
            }
            for (let cyl = 0; cyl < dskImage.numTracks; cyl++) {
                if (findInTrack(cyl, 0, '(c) 1986 for KBI ')) {
                    parts.push('KBI-19');
                    break;
                }
            }
            if (parts.length === 0 || !parts.includes('KBI-19')) {
                const t39 = getTrack(39, 0);
                const t38 = getTrack(38, 0);
                if (t39 && t38 && t39.sectors.length === 10 && t38.sectors.length === 9) {
                    for (const sec of t39.sectors) {
                        if (sec.st1 === 32 && sec.st2 === 32) {
                            if (!parts.includes('KBI-10')) parts.push('KBI-10');
                            break;
                        }
                    }
                }
            }
            for (let cyl = 0; cyl < dskImage.numTracks; cyl++) {
                if (findInTrack(cyl, 0, 'ALAIN LAURENT GENERATION 5 1989')) {
                    parts.push('CAAV');
                    break;
                }
            }
            return parts.length > 0 ? parts.join(' + ') : null;
        }

        function detectDiscSYS() {
            for (let cyl = 0; cyl < dskImage.numTracks; cyl++) {
                for (let head = 0; head < dskImage.numSides; head++) {
                    const t = getTrack(cyl, head);
                    if (!t || t.sectors.length !== 16) continue;
                    let match = true;
                    for (let i = 0; i < 16; i++) {
                        const s = t.sectors[i];
                        if (s.id !== i || s.cylinder !== cyl || s.head !== head) { match = false; break; }
                    }
                    if (match) return 'DiscSYS';
                }
            }
            for (let cyl = 0; cyl < dskImage.numTracks; cyl++) {
                if (findInTrack(cyl, 0, 'discsys')) return 'DiscSYS';
                if (findInTrack(cyl, 0, 'MEAN PROTECTION SYSTEM')) return 'DiscSYS';
            }
            return null;
        }

        function detectAmsoft() {
            const t3 = getTrack(3, 0);
            if (t3) {
                for (const sec of t3.sectors) {
                    if (sec.data && findStringInSector(sec.data, 'Amsoft disc protection system') >= 0
                        && findStringInSector(sec.data, 'EXOPAL') >= 0)
                        return 'Amsoft/EXOPAL';
                }
            }
            return null;
        }

        function detectArmourloc() {
            if (t0.sectors.length > 0 && t0.sectors[0].data && t0.sectors[0].data.length > 7) {
                if (findStringInSector(t0.sectors[0].data.subarray(0, 10), '0K free') === 2)
                    return 'ARMOURLOC';
            }
            return null;
        }

        function detectStudioB() {
            if (findInSectorIdx(0, 0, 0, 'Disc format (c) 1986 Studio B Ltd.')) return 'Studio B';
            if (findInSectorIdx(2, 0, 0, 'DISCLOC')) return 'Studio B/DiscLoc';
            const t1 = getTrack(1, 0);
            const t2 = getTrack(2, 0);
            if (t0.sectors.length > 0 && t1 && t1.sectors.length === 0
                && t2 && t2.sectors.length > 0) {
                if (!findInTrack(0, 0, 'P.M.S.') && !findInTrack(0, 0, '[C] P.M.S.'))
                    return 'Studio B';
            }
            return null;
        }

        const detectors = [
            detectAlkatraz, detectFrontier, detectHexagon, detectPaulOwens,
            detectSpeedlock, detectThreeInch, detectLaserLoad, detectWRM,
            detectPMS, detectPlayers, detectInfogrames, detectRainbowArts,
            detectRemiKBI, detectDiscSYS, detectAmsoft, detectArmourloc,
            detectStudioB
        ];

        for (const detect of detectors) {
            const result = detect();
            if (result) return result;
        }

        return 'Unknown copy protection';
    }

    // Helper: build a DSKImage from buildExtendedDSK buffer
    function parseDSK(buf) {
        return DSKLoader.parse(buf);
    }

    // Helper: create sector data with embedded string
    function makeSectorData(size, str, offset) {
        const data = new Uint8Array(size);
        data.fill(0xE5);
        if (str) {
            const off = offset || 0;
            for (let i = 0; i < str.length; i++) {
                data[off + i] = str.charCodeAt(i);
            }
        }
        return data;
    }

    // Helper: create N identical sectors for a track
    function makeUniformSectors(count, sizeCode, startId) {
        const sectors = [];
        const base = startId || 0xC1;
        for (let i = 0; i < count; i++) {
            sectors.push({ id: base + i, sizeCode, cylinder: 0, head: 0, st1: 0, st2: 0 });
        }
        return sectors;
    }

    function runProtectionTests() {
        section('findStringInSector');

        const testData = new Uint8Array([72, 101, 108, 108, 111]); // "Hello"
        assert(findStringInSector(testData, 'Hello') === 0, 'finds string at start');
        assert(findStringInSector(testData, 'ello') === 1, 'finds string at offset 1');
        assert(findStringInSector(testData, 'World') === -1, 'returns -1 for missing');
        assert(findStringInSector(null, 'Hello') === -1, 'returns -1 for null data');
        assert(findStringInSector(new Uint8Array(0), 'X') === -1, 'returns -1 for empty data');

        section('Uniform clean disk → null');

        // 40 tracks, all 9 sectors × 512B, no errors
        const uniformTracks = [];
        for (let t = 0; t < 40; t++) {
            uniformTracks.push({ sectors: makeUniformSectors(9, 2) });
        }
        const uniformBuf = buildExtendedDSK(40, 1, uniformTracks);
        const uniformImg = parseDSK(uniformBuf);
        assert(detectDiskProtection(uniformImg) === null, 'uniform disk returns null');

        section('Speedlock +3 1987 (structural)');

        // T0=9sec, T1=5sec×1024B, T0/S6 st2=64, T0/S8 st2=0
        const sl87Tracks = [];
        // T0: 9 sectors, 512B
        const t0secs87 = [];
        for (let i = 0; i < 9; i++) {
            t0secs87.push({
                id: 0xC1 + i, sizeCode: 2, cylinder: 0, head: 0,
                st1: 0, st2: (i === 6) ? 64 : 0
            });
        }
        sl87Tracks.push({ sectors: t0secs87 });
        // T1: 5 sectors, 1024B
        const t1secs87 = [];
        for (let i = 0; i < 5; i++) {
            t1secs87.push({ id: 0xC1 + i, sizeCode: 3, cylinder: 1, head: 0, st1: 0, st2: 0 });
        }
        sl87Tracks.push({ sectors: t1secs87 });
        // T2-T39: uniform 9×512B
        for (let t = 2; t < 40; t++) {
            sl87Tracks.push({ sectors: makeUniformSectors(9, 2) });
        }
        const sl87Buf = buildExtendedDSK(40, 1, sl87Tracks);
        const sl87Img = parseDSK(sl87Buf);
        assert(detectDiskProtection(sl87Img) === 'Speedlock +3 1987', 'detects Speedlock +3 1987');

        section('Speedlock +3 1988 (structural)');

        // Same as 1987 but T0/S8 st2=64
        const sl88Tracks = [];
        const t0secs88 = [];
        for (let i = 0; i < 9; i++) {
            t0secs88.push({
                id: 0xC1 + i, sizeCode: 2, cylinder: 0, head: 0,
                st1: 0, st2: (i === 6 || i === 8) ? 64 : 0
            });
        }
        sl88Tracks.push({ sectors: t0secs88 });
        const t1secs88 = [];
        for (let i = 0; i < 5; i++) {
            t1secs88.push({ id: 0xC1 + i, sizeCode: 3, cylinder: 1, head: 0, st1: 0, st2: 0 });
        }
        sl88Tracks.push({ sectors: t1secs88 });
        for (let t = 2; t < 40; t++) {
            sl88Tracks.push({ sectors: makeUniformSectors(9, 2) });
        }
        const sl88Buf = buildExtendedDSK(40, 1, sl88Tracks);
        const sl88Img = parseDSK(sl88Buf);
        assert(detectDiskProtection(sl88Img) === 'Speedlock +3 1988', 'detects Speedlock +3 1988');

        section('Speedlock 1989/1990 (structural)');

        // T0>7sec, T1=1sec ID=193 st1=32
        const sl89Tracks = [];
        sl89Tracks.push({ sectors: makeUniformSectors(9, 2) });
        sl89Tracks.push({ sectors: [{ id: 193, sizeCode: 2, cylinder: 1, head: 0, st1: 32, st2: 0 }] });
        for (let t = 2; t < 40; t++) {
            sl89Tracks.push({ sectors: makeUniformSectors(9, 2) });
        }
        const sl89Buf = buildExtendedDSK(40, 1, sl89Tracks);
        const sl89Img = parseDSK(sl89Buf);
        assert(detectDiskProtection(sl89Img) === 'Speedlock 1989/1990', 'detects Speedlock 1989/1990');

        section('Alkatraz (signature)');

        const alkTracks = [];
        const alkSig = 'THE ALKATRAZ PROTECTION SYSTEM';
        const alkData = makeSectorData(512, alkSig, 0);
        const alkT0Secs = [{ id: 0xC1, sizeCode: 2, cylinder: 0, head: 0, st1: 0, st2: 0, data: alkData }];
        for (let i = 1; i < 9; i++) {
            alkT0Secs.push({ id: 0xC1 + i, sizeCode: 2, cylinder: 0, head: 0, st1: 0, st2: 0 });
        }
        alkTracks.push({ sectors: alkT0Secs });
        // T1 different sector count to trigger non-uniform
        alkTracks.push({ sectors: makeUniformSectors(8, 2) });
        for (let t = 2; t < 40; t++) {
            alkTracks.push({ sectors: makeUniformSectors(9, 2) });
        }
        const alkBuf = buildExtendedDSK(40, 1, alkTracks);
        const alkImg = parseDSK(alkBuf);
        assert(detectDiskProtection(alkImg) === 'Alkatraz', 'detects Alkatraz by signature');

        section('Hexagon (signature)');

        const hexTracks = [];
        hexTracks.push({ sectors: makeUniformSectors(9, 2) });
        const hexSig = 'HEXAGON DISK PROTECTION c 1989';
        const hexData = makeSectorData(512, hexSig, 10);
        const hexT1Secs = [{ id: 0xC1, sizeCode: 2, cylinder: 1, head: 0, st1: 0, st2: 0, data: hexData }];
        for (let i = 1; i < 8; i++) {
            hexT1Secs.push({ id: 0xC1 + i, sizeCode: 2, cylinder: 1, head: 0, st1: 0, st2: 0 });
        }
        hexTracks.push({ sectors: hexT1Secs });
        for (let t = 2; t < 40; t++) {
            hexTracks.push({ sectors: makeUniformSectors(9, 2) });
        }
        const hexBuf = buildExtendedDSK(40, 1, hexTracks);
        const hexImg = parseDSK(hexBuf);
        assert(detectDiskProtection(hexImg) === 'Hexagon', 'detects Hexagon by signature');

        section('Remi + KBI combined');

        const rkTracks = [];
        // T0: embed Remi signature
        const remiData = makeSectorData(512, 'PROTECTION      Remi HERBULOT', 0);
        const rkT0Secs = [{ id: 0xC1, sizeCode: 2, cylinder: 0, head: 0, st1: 0, st2: 0, data: remiData }];
        for (let i = 1; i < 9; i++) {
            rkT0Secs.push({ id: 0xC1 + i, sizeCode: 2, cylinder: 0, head: 0, st1: 0, st2: 0 });
        }
        rkTracks.push({ sectors: rkT0Secs });
        // T1: embed KBI signature
        const kbiData = makeSectorData(512, '(c) 1986 for KBI ', 0);
        const rkT1Secs = [{ id: 0xC1, sizeCode: 2, cylinder: 1, head: 0, st1: 0, st2: 0, data: kbiData }];
        for (let i = 1; i < 8; i++) {
            rkT1Secs.push({ id: 0xC1 + i, sizeCode: 2, cylinder: 1, head: 0, st1: 0, st2: 0 });
        }
        rkTracks.push({ sectors: rkT1Secs });
        for (let t = 2; t < 40; t++) {
            rkTracks.push({ sectors: makeUniformSectors(9, 2) });
        }
        const rkBuf = buildExtendedDSK(40, 1, rkTracks);
        const rkImg = parseDSK(rkBuf);
        assert(detectDiskProtection(rkImg) === 'Remi Herbulot + KBI-19', 'detects combined Remi + KBI');

        section('Unknown protection');

        // Non-uniform tracks with FDC errors, no matching signatures
        const unkTracks = [];
        const unkT0Secs = [];
        for (let i = 0; i < 9; i++) {
            unkT0Secs.push({ id: 0xC1 + i, sizeCode: 2, cylinder: 0, head: 0, st1: 0, st2: 0 });
        }
        unkTracks.push({ sectors: unkT0Secs });
        // T1: different count + errors
        unkTracks.push({ sectors: [
            { id: 0xC1, sizeCode: 2, cylinder: 1, head: 0, st1: 0x20, st2: 0x40 },
            { id: 0xC2, sizeCode: 2, cylinder: 1, head: 0, st1: 0, st2: 0 },
            { id: 0xC3, sizeCode: 2, cylinder: 1, head: 0, st1: 0, st2: 0 },
        ]});
        for (let t = 2; t < 40; t++) {
            unkTracks.push({ sectors: makeUniformSectors(9, 2) });
        }
        const unkBuf = buildExtendedDSK(40, 1, unkTracks);
        const unkImg = parseDSK(unkBuf);
        assert(detectDiskProtection(unkImg) === 'Unknown copy protection', 'non-uniform + errors → Unknown');

        section('P.M.S. (structural)');

        // T0 formatted, T1 empty (0 sectors), T2 formatted
        const pmsTracks = [];
        pmsTracks.push({ sectors: makeUniformSectors(9, 2) });
        pmsTracks.push({ sectors: [] }); // T1 empty
        pmsTracks.push({ sectors: makeUniformSectors(9, 2) });
        for (let t = 3; t < 40; t++) {
            pmsTracks.push({ sectors: makeUniformSectors(9, 2) });
        }
        const pmsBuf = buildExtendedDSK(40, 1, pmsTracks);
        const pmsImg = parseDSK(pmsBuf);
        assert(detectDiskProtection(pmsImg) === 'P.M.S.', 'detects P.M.S. structural');

        updateSummary();
    }

    // ═══════════════════════════════════════════════════════
    // Run All
    // ═══════════════════════════════════════════════════════
    function runAll() {
        passed = 0;
        failed = 0;
        logEl.innerHTML = '';
        log('Running all FDC & DSK tests...', 'info');

        runDSKImageTests();
        runDSKLoaderTests();
        runDSKFilesystemTests();
        runUPD765BasicTests();
        runUPD765CommandTests();
        runUPD765DataTests();
        runRoundTripTests();
        runTOSTests();
        runSKDeletedTests();
        runWeakSectorTests();
        runProtectionTests();

        log(`\nDone. ${passed} passed, ${failed} failed.`, failed > 0 ? 'fail' : 'pass');
        updateSummary();
    }

    // Expose to buttons
    window.runAll = runAll;
    window.runDSKImageTests = () => { passed=0; failed=0; logEl.innerHTML=''; runDSKImageTests(); };
    window.runDSKLoaderTests = () => { passed=0; failed=0; logEl.innerHTML=''; runDSKLoaderTests(); };
    window.runDSKFilesystemTests = () => { passed=0; failed=0; logEl.innerHTML=''; runDSKFilesystemTests(); };
    window.runUPD765BasicTests = () => { passed=0; failed=0; logEl.innerHTML=''; runUPD765BasicTests(); };
    window.runUPD765CommandTests = () => { passed=0; failed=0; logEl.innerHTML=''; runUPD765CommandTests(); };
    window.runUPD765DataTests = () => { passed=0; failed=0; logEl.innerHTML=''; runUPD765DataTests(); };
    window.runRoundTripTests = () => { passed=0; failed=0; logEl.innerHTML=''; runRoundTripTests(); };
    window.runTOSTests = () => { passed=0; failed=0; logEl.innerHTML=''; runTOSTests(); };
    window.runSKDeletedTests = () => { passed=0; failed=0; logEl.innerHTML=''; runSKDeletedTests(); };
    window.runWeakSectorTests = () => { passed=0; failed=0; logEl.innerHTML=''; runWeakSectorTests(); };
    window.runProtectionTests = () => { passed=0; failed=0; logEl.innerHTML=''; runProtectionTests(); };

    // Auto-run
    runAll();
</script>
